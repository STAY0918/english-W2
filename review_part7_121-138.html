<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>英語W2 121〜138</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}main{max-width:590px;margin:auto;padding:16px 12px 34px}.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 28px #00000014}h1{font-size:22px}.title{font-size:27px;font-weight:900}.sub{color:#667085;margin-bottom:14px}.notice{background:#f6f8fb;border:1px solid #dde3ec;border-radius:14px;padding:14px;margin-bottom:14px}.notice h3{margin:0 0 9px;font-size:15px}.ni{display:grid;grid-template-columns:14px 1fr;gap:9px;margin:9px 0;font-size:13px;color:#475467;line-height:1.55}.ex{margin-top:7px}.er{display:grid;grid-template-columns:22px 1fr;gap:7px;margin:4px 0}label{display:block;font-size:13px;color:#667085;margin:18px 0 7px}input{width:100%;padding:15px;border:2px solid #d7dde7;border-radius:14px;font-size:18px}button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:850;margin-top:12px}.primary{background:#111827;color:#fff}.next{background:#4f46e5;color:#fff}.hidden{display:none!important}.meta{display:flex;justify-content:space-between;color:#667085;font-size:14px;margin-bottom:10px}.jp{min-height:116px;padding:22px;border-radius:16px;background:#f6f8fb;display:flex;align-items:center;font-size:24px;font-weight:850;line-height:1.5}.result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.55}.ok{background:#edf9f0;border:1px solid #bce4c6}.ng{background:#fff1f1;border:1px solid #f0c0c0}.ans{font-size:18px;font-weight:900;margin-top:6px}.sec{background:#ffffffd1;border-radius:12px;padding:11px;margin-top:10px}.st{font-size:12px;color:#667085;font-weight:850;margin-bottom:5px}.we{font-weight:850;line-height:1.55}.txt{font-size:14px;color:#344054;margin-top:5px;line-height:1.68}.wf{font-size:14px;font-weight:850}.banner{background:#fff7db;border:1px solid #ecd98d;border-radius:12px;padding:11px;margin-bottom:12px;font-size:14px}.score{font-size:34px;font-weight:950}
</style></head><body><main><h1>英語W2 暗記テスト</h1>
<section id="setup" class="card"><div class="title">121〜138問</div><div class="sub">間違えた問題は、全問正解するまで自動で復習します。</div>
<div class="notice"><h3>入力時の注意</h3>
<div class="ni"><b>・</b><div>スペースの有無まで採点します。<div class="ex"><div class="er"><span>○</span><span>make 人 動詞の原形</span></div><div class="er"><span>×</span><span>make人 動詞の原形</span></div></div></div></div>
<div class="ni"><b>・</b><div>漢字や英単語も表示どおり入力してください。<div class="ex">例：原形を原型と入力すると不正解です。</div></div></div>
<div class="ni"><b>・</b><div>全角スペースと半角スペースは、どちらでも正解になります。</div></div><div class="ni"><b>・</b><div>ピリオド（.）は入力しなくて大丈夫です。</div></div><div class="ni"><b>・</b><div>疑問文は最後の「?」まで入力してください。</div></div><div class="ni"><b>・</b><div>命令文は文頭を大文字で入力してください。</div></div></div>
<button id="startBtn" class="primary">テスト開始</button></section>
<section id="game" class="card hidden"><div id="banner" class="banner hidden"></div><div class="meta"><span id="roundText"></span><span id="progress"></span></div><div id="jp" class="jp"></div><label>英語を入力</label><input id="answer" autocomplete="off" autocorrect="off" spellcheck="false"><button id="checkBtn" class="primary">答え合わせ</button><button id="nextBtn" class="next hidden">次の問題</button>
<div id="result" class="result"><strong id="judge"></strong><div id="correct" class="ans"></div><div class="sec"><div class="st">基本形</div><div id="basic" class="txt"></div></div><div class="sec"><div class="st">📖 ワークではこう使われている</div><div id="workEn" class="we"></div><div id="workJa" class="txt"></div></div><div class="sec"><div class="st">💡 ポイント</div><div id="workForm" class="wf"></div><div id="point" class="txt"></div></div></div></section>
<section id="finish" class="card hidden"><h2>🎉 全問正解！</h2><div id="score" class="score"></div><p id="summary"></p><button id="restartBtn" class="primary">もう一度やる</button></section></main>
<script>const QUESTIONS=[{"id": 121, "jp": "その問題を解決することができた", "answer": "managed to solve", "basic": "manage to + 動詞の原形＝「なんとか～する・～することができる」。", "work_en": "We managed to solve the problem without your help.", "work_ja": "私たちはあなたの助けなしで、その問題を解決することができた。", "work_form": "managed to solve", "changed": false, "reason": "managed to solve がそのまま使われています。manage の後ろは動名詞ではなく、to solve です。"}, {"id": 122, "jp": "仕事に行くのを避ける", "answer": "avoid going", "basic": "avoid + 動名詞＝「～するのを避ける」。", "work_en": "I usually avoid going to work during rush hours.", "work_ja": "私はたいてい、ラッシュアワーに仕事へ行くのを避けている。", "work_form": "avoid going", "changed": false, "reason": "avoid going がそのまま使われています。avoid の後ろは to go ではなく going です。"}, {"id": 123, "jp": "何も知らないふりをした", "answer": "pretended to know", "basic": "pretend to + 動詞の原形＝「～するふりをする」。", "work_en": "He pretended to know nothing.", "work_ja": "彼は何も知らないふりをした。", "work_form": "pretended to know", "changed": false, "reason": "pretended to know がそのまま使われています。過去の話なので pretend → pretended になっています。"}, {"id": 124, "jp": "お金を盗んだことを認めた", "answer": "admitted having stolen", "basic": "admit + 動名詞＝「～したことを認める」。having + 過去分詞は、主節より前の出来事を表します。", "work_en": "He admitted having stolen some money from the safe.", "work_ja": "彼は金庫からお金を盗んだことを認めた。", "work_form": "admitted having stolen", "changed": false, "reason": "admitted having stolen がそのまま使われています。盗んだのは認めた時より前なので、having stolen を使っています。"}, {"id": 125, "jp": "雷鳴を聞くことを予想する", "answer": "expect to hear", "basic": "expect to + 動詞の原形＝「～することを予想する」。", "work_en": "People usually expect to hear thunder after they see lightning.", "work_ja": "人々は普通、稲妻を見たあとに雷鳴を聞くものだと予想する。", "work_form": "expect to hear", "changed": false, "reason": "expect to hear がそのまま使われています。expect の後ろは hearing ではなく to hear です。"}, {"id": 126, "jp": "テレビを見るのを楽しんだ", "answer": "enjoyed watching", "basic": "enjoy + 動名詞＝「～するのを楽しむ」。", "work_en": "We enjoyed watching TV last night.", "work_ja": "私たちは昨夜、テレビを見るのを楽しんだ。", "work_form": "enjoyed watching", "changed": false, "reason": "enjoyed watching がそのまま使われています。過去の話なので enjoy → enjoyed。enjoy の後ろは to watch ではなく watching です。"}, {"id": 127, "jp": "彼らの話を聞くことを拒んだ", "answer": "refused to listen", "basic": "refuse to + 動詞の原形＝「～することを拒む」。", "work_en": "He refused to listen to them.", "work_ja": "彼は彼らの話を聞くことを拒んだ。", "work_form": "refused to listen", "changed": false, "reason": "refused to listen がそのまま使われています。過去の話なので refuse → refused。listen の後ろには to が必要です。"}, {"id": 128, "jp": "その本を読み終えた", "answer": "finished reading", "basic": "finish + 動名詞＝「～し終える」。", "work_en": "I finished reading the book yesterday morning.", "work_ja": "私は昨日の朝、その本を読み終えた。", "work_form": "finished reading", "changed": false, "reason": "finished reading がそのまま使われています。finish の後ろは to read ではなく reading です。"}, {"id": 129, "jp": "カナダで働くことを考えたことがありますか？", "answer": "Have you ever considered working in Canada?", "basic": "consider + 動名詞＝「～することを検討する・考える」。", "work_en": "Have you ever considered working in Canada?", "work_ja": "カナダで働くことを考えたことがありますか。", "work_form": "Have you ever considered working in Canada?", "changed": false, "reason": "ワークの英文を一文そのまま答える問題です。consider の後ろは to work ではなく working。疑問文なので最後は ? が必要です。"}, {"id": 130, "jp": "あなたを泣かせるつもりではなかった", "answer": "didn't mean to make you cry", "basic": "mean to + 動詞の原形＝「～するつもりである」。否定すると「～するつもりではない」。", "work_en": "I'm terribly sorry, but I didn't mean to make you cry.", "work_ja": "本当にごめんなさい。あなたを泣かせるつもりではありませんでした。", "work_form": "didn't mean to make you cry", "changed": false, "reason": "didn't mean to make you cry がそのまま使われています。make + 人 + 動詞の原形なので、you の後ろは to cry ではなく cry です。"}, {"id": 131, "jp": "忘れずに彼のオフィスへ立ち寄る", "answer": "remember to stop", "basic": "remember to + 動詞の原形＝「忘れずに～する」。stop by＝「立ち寄る」。", "work_en": "Please remember to stop by his office before you go home.", "work_ja": "家に帰る前に、忘れずに彼のオフィスへ立ち寄ってください。", "work_form": "remember to stop", "changed": false, "reason": "remember to stop がそのまま使われています。これからすることを忘れない、という意味なので to stop を使います。"}, {"id": 132, "jp": "残念ながら～とお伝えする", "answer": "regret to tell", "basic": "regret to + 動詞の原形＝「残念ながら～する」。これから伝える悪い知らせに使います。", "work_en": "We regret to tell you that you did not win the contest.", "work_ja": "残念ながら、あなたはコンテストで優勝しなかったことをお伝えします。", "work_form": "regret to tell", "changed": false, "reason": "regret to tell がそのまま使われています。これから伝える内容なので telling ではなく to tell です。"}, {"id": 133, "jp": "彼女に話しかけてみた", "answer": "tried to speak", "basic": "try to + 動詞の原形＝「～しようと試みる」。", "work_en": "I tried to speak to her, but she did not like what I said.", "work_ja": "私は彼女に話しかけてみたが、彼女は私の言ったことが気に入らなかった。", "work_form": "tried to speak", "changed": false, "reason": "tried to speak がそのまま使われています。実際に話そうと試みたので、try speaking ではなく tried to speak です。"}, {"id": 134, "jp": "少しの間、私があなたに話しかけてもかまいませんか？", "answer": "Would you mind my talking to you for a while?", "basic": "Would you mind + 所有格・目的格 + 動名詞?＝「人が～してもかまいませんか」。", "work_en": "Would you mind my talking to you for a while?", "work_ja": "少しの間、私があなたに話しかけてもかまいませんか。", "work_form": "Would you mind my talking to you for a while?", "changed": false, "reason": "ワークでは my talking を使っています。me talking も会話では使われますが、テストではワークどおり my talking で覚えます。最後は ? が必要です。", "aliases": ["Would you mind me talking to you for a while?"]}, {"id": 135, "jp": "おばから連絡がないこと", "answer": "not hearing", "basic": "前置詞 about の後ろには動名詞を置きます。not + 動名詞で「～しないこと」。", "work_en": "I'm worried about not hearing from my aunt.", "work_ja": "私はおばから連絡がないことを心配している。", "work_form": "not hearing", "changed": false, "reason": "not hearing がそのまま使われています。about は前置詞なので、後ろは to hear ではなく hearing です。"}, {"id": 136, "jp": "母親を悲しませたこと", "answer": "having made", "basic": "having + 過去分詞は、主節より前に起きたことを表す完了動名詞です。", "work_en": "Ryo isn't aware of having made his mother sad.", "work_ja": "亮は母親を悲しませたことに気づいていない。", "work_form": "having made", "changed": false, "reason": "having made がそのまま使われています。母親を悲しませたのは、今気づいていない時点より前だからです。make + 人 + 形容詞の形です。"}, {"id": 137, "jp": "メグと呼ばれること", "answer": "being called", "basic": "being + 過去分詞は動名詞の受動態で、「～されること」。", "work_en": "She is fond of being called Meg.", "work_ja": "彼女はメグと呼ばれるのが好きだ。", "work_form": "being called", "changed": false, "reason": "being called がそのまま使われています。彼女は呼ぶ側ではなく呼ばれる側なので、受動態です。"}, {"id": 138, "jp": "日本へ招待されること", "answer": "being invited", "basic": "being + 過去分詞は動名詞の受動態です。look forward to の to は前置詞なので、後ろに動名詞を置きます。", "work_en": "She was looking forward to being invited to Japan.", "work_ja": "彼女は日本へ招待されるのを楽しみにしていた。", "work_form": "being invited", "changed": false, "reason": "being invited がそのまま使われています。to の後ろは be invited ではなく being invited。彼女は招待される側なので受動態です。"}];let pool=[],wrongNext=[],index=0,round=1,current,answered=false,firstTotal=0,firstCorrect=0;const $=id=>document.getElementById(id);
function norm(t){return t.trim().replace(/　/g," ").replace(/\s+/g," ").replace(/[.]$/,"")}
function start(){pool=QUESTIONS.slice();wrongNext=[];index=0;round=1;firstTotal=pool.length;firstCorrect=0;$("setup").classList.add("hidden");$("finish").classList.add("hidden");$("game").classList.remove("hidden");show()}
function show(){current=pool[index];answered=false;$("roundText").textContent=round===1?"1周目":round+"周目（復習）";$("progress").textContent=(index+1)+" / "+pool.length+"　問題"+current.id;$("jp").textContent=current.jp;$("answer").value="";$("answer").disabled=false;$("result").style.display="none";$("nextBtn").classList.add("hidden");$("banner").classList.add("hidden");setTimeout(()=>$("answer").focus(),100)}
function correct(t,a){let nt=t.trim().replace(/　/g," ").replace(/\s+/g," "),na=a.trim().replace(/　/g," ").replace(/\s+/g," ");return a.endsWith("?")?nt===na:norm(nt)===norm(na)}
function check(){if(answered||!$("answer").value.trim())return;let ok=correct($("answer").value,current.answer)||(current.aliases||[]).some(a=>correct($("answer").value,a));answered=true;if(round===1&&ok)firstCorrect++;if(!ok&&!wrongNext.some(q=>q.id===current.id))wrongNext.push(current);$("result").className="result "+(ok?"ok":"ng");$("result").style.display="block";$("judge").textContent=ok?"⭕ 正解！":"❌ 不正解";$("correct").textContent="正解："+current.answer;$("basic").textContent=current.basic;$("workEn").textContent=current.work_en;$("workJa").textContent="（"+current.work_ja+"）";$("workForm").textContent=current.changed?"【基本形】"+current.answer+"　→　【ワーク】"+current.work_form:"【ワーク】"+current.work_form;$("point").textContent=current.reason;$("answer").disabled=true;$("nextBtn").classList.remove("hidden")}
function next(){index++;if(index<pool.length){show();return}if(!wrongNext.length){finish();return}round++;pool=wrongNext.slice();wrongNext=[];index=0;show();$("banner").textContent="前の周で間違えた "+pool.length+" 問だけを復習します。";$("banner").classList.remove("hidden")}
function finish(){$("game").classList.add("hidden");$("finish").classList.remove("hidden");$("score").textContent=Math.round(firstCorrect/firstTotal*100)+"%";$("summary").textContent="1周目は "+firstCorrect+" / "+firstTotal+" 正解。"+round+"周で全問正解しました。"}
$("startBtn").onclick=start;$("checkBtn").onclick=check;$("nextBtn").onclick=next;$("restartBtn").onclick=()=>{$("finish").classList.add("hidden");$("setup").classList.remove("hidden")};$("answer").onkeydown=e=>{if(e.key==="Enter")answered?next():check()};
</script></body></html>
