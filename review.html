<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>英語W2 テンプレート版</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f7;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}
main{max-width:590px;margin:auto;padding:16px 12px 32px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
h1{font-size:21px;margin:0 0 16px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:13px;color:#667085;margin-bottom:6px}
input{width:100%;padding:14px;border:2px solid #d7dde7;border-radius:14px;font-size:18px;background:#fff;outline:none}
input:focus{border-color:#4f46e5}
button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:800;margin-top:12px}
.primary{background:#111827;color:#fff}
.next{background:#4f46e5;color:#fff}
.hidden{display:none!important}
.meta{display:flex;justify-content:space-between;color:#667085;font-size:14px;margin-bottom:10px}
.jp{min-height:110px;padding:22px;border-radius:16px;background:#f6f8fb;display:flex;align-items:center;font-size:24px;font-weight:800;line-height:1.5}
.result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.55}
.ok{background:#edf9f0;border:1px solid #bce4c6}
.ng{background:#fff1f1;border:1px solid #f0c0c0}
.answer-line{font-size:18px;font-weight:850;margin-top:6px}
.section{background:rgba(255,255,255,.78);border-radius:12px;padding:11px;margin-top:10px}
.section-title{font-size:12px;color:#667085;font-weight:800;margin-bottom:5px}
.work-en{font-weight:800;line-height:1.55}
.work-ja,.point{font-size:14px;color:#344054;margin-top:5px;line-height:1.65}
.compare{font-size:14px;color:#344054;line-height:1.65}
.compare b{color:#172033}
.arrow{text-align:center;font-weight:900;margin:3px 0}
.banner{background:#fff7db;border:1px solid #ecd98d;border-radius:12px;padding:11px;margin-bottom:12px;font-size:14px}
.small{font-size:12px;color:#667085;line-height:1.5;margin-top:12px}
</style>
</head>
<body>
<main>
  <h1>英語W2 テンプレート版（1〜10）</h1>

  <section id="setup" class="card">
    <div class="row">
      <div>
        <label for="startNo">開始番号</label>
        <input id="startNo" type="number" min="1" max="10" value="1">
      </div>
      <div>
        <label for="endNo">終了番号</label>
        <input id="endNo" type="number" min="1" max="10" value="10">
      </div>
    </div>
    <button id="startBtn" class="primary">この範囲で開始</button>
    <div class="small">番号順で1周し、間違えた問題だけ2周目・3周目へ進みます。</div>
  </section>

  <section id="game" class="card hidden">
    <div id="banner" class="banner hidden"></div>
    <div class="meta">
      <span id="roundText"></span>
      <span id="progress"></span>
    </div>

    <div id="jp" class="jp"></div>

    <label for="answer" style="margin-top:18px">英語を入力</label>
    <input id="answer" type="text" autocomplete="off" autocorrect="off" spellcheck="false">

    <button id="checkBtn" class="primary">答え合わせ</button>

    <div id="result" class="result">
      <strong id="judge"></strong>
      <div id="correct" class="answer-line"></div>

      <div class="section">
        <div class="section-title">基本形</div>
        <div id="basic"></div>
      </div>

      <div class="section">
        <div class="section-title">📖 ワークではこう使われている</div>
        <div id="workEn" class="work-en"></div>
        <div id="workJa" class="work-ja"></div>
      </div>

      <div class="section">
        <div class="section-title">💡 ポイント</div>
        <div id="compareBox" class="compare"></div>
        <div id="point" class="point"></div>
      </div>
    </div>

    <button id="nextBtn" class="next hidden">次の問題</button>
  </section>

  <section id="finish" class="card hidden">
    <h2 style="margin-top:0">🎉 全問クリア！</h2>
    <p id="summary"></p>
    <button id="restartBtn" class="primary">範囲選択に戻る</button>
  </section>
</main>

<script>
const QUESTIONS = [{"id": 1, "jp": "青ざめる", "answer": "turn pale", "basic_meaning": "turn + 形容詞で「～になる」。turn pale で「青ざめる」。", "work_en": "She turned pale when she heard the bad news.", "work_ja": "その悪い知らせを聞いて、彼女は青ざめた。", "work_form": "turned pale", "difference": "基本形は turn pale。ワークでは turned pale。", "reason": "過去の出来事なので、turn → turned になっています。"}, {"id": 2, "jp": "起きたままでいる", "answer": "stay awake", "basic_meaning": "stay + 形容詞で「～の状態のままでいる」。stay awake で「起きたままでいる」。", "work_en": "I stayed awake all night.", "work_ja": "私は一晩中、起きたままでいた。", "work_form": "stayed awake", "difference": "基本形は stay awake。ワークでは stayed awake。", "reason": "過去の話なので、stay → stayed になっています。"}, {"id": 3, "jp": "おもしろそうだ", "answer": "sound interesting", "basic_meaning": "sound + 形容詞で「～そうだ・～のように聞こえる」。", "work_en": "That story sounds interesting.", "work_ja": "その話はおもしろそうだ。", "work_form": "sounds interesting", "difference": "基本形は sound interesting。ワークでは sounds interesting。", "reason": "主語 That story は三人称単数なので、sound に s がついて sounds になります。"}, {"id": 4, "jp": "眠いと感じる", "answer": "feel sleepy", "basic_meaning": "feel + 形容詞で「～と感じる」。feel sleepy で「眠いと感じる」。", "work_en": "If you feel sleepy in class, pinch your cheek.", "work_ja": "授業中に眠いと感じたら、ほおをつねりなさい。", "work_form": "feel sleepy", "difference": "", "reason": "feel sleepy がそのまま使われています。主語が you なので、現在形でも feel に s はつきません。"}, {"id": 5, "jp": "人に物を送る", "answer": "send 人 物", "basic_meaning": "send + 人 + 物で「人に物を送る」。", "work_en": "Mary sent me some beautiful postcards.", "work_ja": "メアリーは私にきれいな絵はがきを何枚か送った。", "work_form": "sent me some beautiful postcards", "difference": "基本形は send 人 物。ワークでは sent me some beautiful postcards。", "reason": "過去の出来事なので、send → sent になっています。人の部分に me、物の部分に some beautiful postcards が入っています。"}, {"id": 6, "jp": "人に英語を教える", "answer": "teach English to 人", "basic_meaning": "teach 物 to 人で「人に物を教える」。", "work_en": "My father teaches English to me every Sunday.", "work_ja": "父は毎週日曜日、私に英語を教えてくれる。", "work_form": "teaches English to me", "difference": "基本形は teach English to 人。ワークでは teaches English to me。", "reason": "主語 My father は三人称単数なので、teach に es がついて teaches になります。人の部分には me が入っています。"}, {"id": 7, "jp": "人のためにドレスを作る", "answer": "make a dress for 人", "basic_meaning": "make 物 for 人で「人のために物を作る」。", "work_en": "She made a dress for her daughter.", "work_ja": "彼女は娘のためにドレスを作った。", "work_form": "made a dress for her daughter", "difference": "基本形は make a dress for 人。ワークでは made a dress for her daughter。", "reason": "過去の出来事なので、make → made になっています。人の部分には her daughter が入っています。"}, {"id": 8, "jp": "人を怒らせる", "answer": "make 人 angry", "basic_meaning": "make + 人 + 形容詞で「人を～な状態にする」。", "work_en": "The letter made me angry.", "work_ja": "その手紙は私を怒らせた。", "work_form": "made me angry", "difference": "基本形は make 人 angry。ワークでは made me angry。", "reason": "過去の出来事なので、make → made になっています。人の部分には me が入っています。"}, {"id": 9, "jp": "横になる", "answer": "lie down", "basic_meaning": "lie down で「横になる」。", "work_en": "I want to lie down on the grass.", "work_ja": "私は芝生の上で横になりたい。", "work_form": "lie down", "difference": "", "reason": "lie down がそのまま使われています。want to の後ろなので、動詞は原形 lie のままです。"}, {"id": 10, "jp": "～を置く・築く", "answer": "lay", "basic_meaning": "lay は「～を置く・築く」。", "work_en": "He laid the foundation of that project.", "work_ja": "彼はその計画の基礎を築いた。", "work_form": "laid", "difference": "基本形は lay。ワークでは laid。", "reason": "過去の出来事なので、lay → laid になっています。lie の過去形 lay とは別物です。"}];
let pool=[], wrongNext=[], index=0, round=1, current=null, answered=false;
let firstTotal=0, firstCorrect=0;
const $ = id => document.getElementById(id);

function normalize(text) {
  return text.trim().replace(/　/g," ").replace(/\s+/g," ").replace(/[.]$/,"");
}

function startGame() {
  let start=Math.max(1,Math.min(10,Number($("startNo").value)||1));
  let end=Math.max(1,Math.min(10,Number($("endNo").value)||10));
  if(start>end) [start,end]=[end,start];

  pool=QUESTIONS.filter(q=>q.id>=start&&q.id<=end);
  wrongNext=[]; index=0; round=1; firstTotal=pool.length; firstCorrect=0;

  $("setup").classList.add("hidden");
  $("finish").classList.add("hidden");
  $("game").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  current=pool[index];
  answered=false;
  $("roundText").textContent=round===1?"1周目":`${round}周目（復習）`;
  $("progress").textContent=`${index+1} / ${pool.length}　問題${current.id}`;
  $("jp").textContent=current.jp;
  $("answer").value="";
  $("answer").disabled=false;
  $("result").style.display="none";
  $("nextBtn").classList.add("hidden");
  $("banner").classList.add("hidden");
  setTimeout(()=>$("answer").focus(),100);
}

function isCorrectAnswer(typed, answer) {
  const needsQuestionMark=answer.endsWith("?");
  const t=typed.trim().replace(/　/g," ").replace(/\s+/g," ");
  const a=answer.trim().replace(/　/g," ").replace(/\s+/g," ");
  if(needsQuestionMark) return t===a;
  return normalize(t)===normalize(a);
}

function checkAnswer() {
  if(answered) return;
  const typed=$("answer").value;
  if(!typed.trim()) return;

  const ok=isCorrectAnswer(typed,current.answer);
  answered=true;

  if(round===1&&ok) firstCorrect++;
  if(!ok&&!wrongNext.some(q=>q.id===current.id)) wrongNext.push(current);

  $("result").className="result "+(ok?"ok":"ng");
  $("result").style.display="block";
  $("judge").textContent=ok?"⭕ 正解！":"❌ 不正解";
  $("correct").textContent="正解："+current.answer;
  $("basic").textContent=current.basic_meaning;
  $("workEn").textContent=current.work_en;
  $("workJa").textContent="（"+current.work_ja+"）";

  if(current.difference) {
    $("compareBox").innerHTML =
      "<b>"+current.difference.split("。")[0]+"。</b>";
  } else {
    $("compareBox").innerHTML =
      "<b>基本形がワークでもそのまま使われています。</b>";
  }
  $("point").textContent=current.reason;

  $("answer").disabled=true;
  $("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  index++;
  if(index<pool.length) { showQuestion(); return; }

  if(wrongNext.length===0) { finishGame(); return; }

  round++;
  pool=wrongNext.slice();
  wrongNext=[];
  index=0;
  showQuestion();
  $("banner").textContent=`前の周で間違えた ${pool.length} 問だけを復習します。`;
  $("banner").classList.remove("hidden");
}

function finishGame() {
  $("game").classList.add("hidden");
  $("finish").classList.remove("hidden");
  $("summary").textContent=`1周目は ${firstCorrect} / ${firstTotal} 正解。${round}周で全問正解しました。`;
}

$("startBtn").addEventListener("click",startGame);
$("checkBtn").addEventListener("click",checkAnswer);
$("nextBtn").addEventListener("click",nextQuestion);
$("restartBtn").addEventListener("click",()=>{
  $("finish").classList.add("hidden");
  $("setup").classList.remove("hidden");
});
$("answer").addEventListener("keydown",e=>{
  if(e.key==="Enter") answered?nextQuestion():checkAnswer();
});
</script>
</body>
</html>
