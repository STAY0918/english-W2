</style></head><body><main><h1>英語W2 前期末対策</h1>
<section id="setup" class="card"><div class="title">1〜138問</div><div class="sub">間違えた問題は、全問正解するまで自動で復習します。</div>

<div class="ni"><b>・</b><div>スペースの有無まで採点します。<div class="ex"><div class="er"><span>○</span><span>make 人 動詞の原形</span></div><div class="er"><span>×</span><span>make人 動詞の原形</span></div></div></div></div>
<div class="ni"><b>・</b><div>漢字や英単語も表示どおり入力してください。<div class="ex">例：原形を原型と入力すると不正解です。</div></div></div>
<div class="ni"><b>・</b><div>全角スペースと半角スペースは、どちらでも正解になります。</div></div><div class="ni"><b>・</b><div>ピリオド（.）は入力しなくて大丈夫です。</div></div><div class="ni"><b>・</b><div>疑問文は最後の「?」まで入力してください。</div></div><div class="ni"><b>・</b><div>命令文は文頭を大文字で入力してください。</div></div></div>

<script>const QUESTIONS=[{"id": 1, "jp": "青ざめる", "answer": "turn pale", "basic": "turn pale＝「青ざめる」。turn + 形容詞で「～な状態になる」。", "work_en": "She turned pale when she heard the bad news.", "work_ja": "その悪い知らせを聞いて、彼女は青ざめた。", "work_form": "turned pale", "changed": true, "reason": "基本形は turn pale。ワークでは過去の出来事なので、turn → turned になっています。"}, {"id": 2, "jp": "起きたままでいる", "answer": "stay awake", "basic": "stay awake＝「起きたままでいる」。stay + 形容詞で「～の状態のままでいる」。", "work_en": "I stayed awake all night.", "work_ja": "私は一晩中、目を覚ましたままでいた。", "work_form": "stayed awake", "changed": true, "reason": "基本形は stay awake。ワークでは過去の話なので、stay → stayed になっています。"}, {"id": 3, "jp": "おもしろそうだ", "answer": "sound interesting", "basic": "sound interesting＝「おもしろそうだ」。sound + 形容詞で「～そうだ」。", "work_en": "That story about a dog sounds interesting.", "work_ja": "犬についてのその物語は、おもしろそうだ。", "work_form": "sounds interesting", "changed": true, "reason": "基本形は sound interesting。主語 That story about a dog が三人称単数なので、sound → sounds になっています。"}, {"id": 4, "jp": "眠いと感じる", "answer": "feel sleepy", "basic": "feel sleepy＝「眠いと感じる」。feel + 形容詞で「～と感じる」。", "work_en": "If you feel sleepy in class, pinch your cheek and keep your eyes open.", "work_ja": "授業中に眠くなったら、ほおをつねって目を開けていなさい。", "work_form": "feel sleepy", "changed": false, "reason": "feel sleepy がそのまま使われています。主語が you なので、現在形でも feel に s はつきません。"}, {"id": 5, "jp": "人に物を送る", "answer": "send 人 物", "basic": "send + 人 + 物＝「人に物を送る」。", "work_en": "Mary sent me some beautiful postcards.", "work_ja": "メアリーは私にきれいな絵はがきを何枚か送ってくれた。", "work_form": "sent me some beautiful postcards", "changed": true, "reason": "基本形は send 人 物。ワークでは過去なので send → sent。人の部分に me、物の部分に some beautiful postcards が入っています。"}, {"id": 6, "jp": "人に英語を教える", "answer": "teach English to 人", "basic": "teach English to 人＝「人に英語を教える」。teach 物 to 人の形です。", "work_en": "My father teaches English to me every Sunday.", "work_ja": "父は毎週日曜日、私に英語を教えてくれる。", "work_form": "teaches English to me", "changed": true, "reason": "基本形は teach English to 人。主語 My father が三人称単数なので teach → teaches。人の部分には me が入っています。"}, {"id": 7, "jp": "人のためにドレスを作る", "answer": "make a dress for 人", "basic": "make a dress for 人＝「人のためにドレスを作る」。make 物 for 人の形です。", "work_en": "She made a dress for her daughter.", "work_ja": "彼女は娘のためにドレスを作った。", "work_form": "made a dress for her daughter", "changed": true, "reason": "基本形は make a dress for 人。過去の話なので make → made。人の部分には her daughter が入っています。"}, {"id": 8, "jp": "人を怒らせる", "answer": "make 人 angry", "basic": "make + 人 + angry＝「人を怒らせる」。make + 人 + 形容詞の形です。", "work_en": "The letter made me angry.", "work_ja": "その手紙は私を怒らせた。", "work_form": "made me angry", "changed": true, "reason": "基本形は make 人 angry。過去の話なので make → made。人の部分には me が入っています。"}, {"id": 9, "jp": "横になる", "answer": "lie down", "basic": "lie down＝「横になる」。", "work_en": "I want to lie down on the grass.", "work_ja": "私は芝生の上で横になりたい。", "work_form": "lie down", "changed": false, "reason": "lie down がそのまま使われています。want to の後ろなので、動詞は原形 lie のままです。"}, {"id": 10, "jp": "～を置く・築く", "answer": "lay", "basic": "lay＝「～を置く・築く」。後ろに置く物が必要な他動詞です。", "work_en": "He laid the foundation of that project.", "work_ja": "彼はその計画の基礎を築いた。", "work_form": "laid", "changed": true, "reason": "基本形は lay。ワークでは過去の話なので lay → laid になっています。lie の過去形 lay とは別物です。"}, {"id": 11, "jp": "手を挙げなさい", "answer": "Raise your hand", "basic": "Raise your hand＝「手を挙げなさい」。命令文なので動詞の原形から始めます。", "work_en": "Raise your hand if you have any questions.", "work_ja": "質問があれば手を挙げてください。", "work_form": "Raise your hand", "changed": false, "reason": "Raise your hand がそのまま使われています。命令文なので文頭は大文字の Raise です。"}, {"id": 12, "jp": "昇る", "answer": "rise", "basic": "rise＝「自然に上がる・昇る」。後ろに目的語を置かない自動詞です。", "work_en": "The sun rises in the east and sets in the west.", "work_ja": "太陽は東から昇り、西に沈む。", "work_form": "rises", "changed": true, "reason": "基本形は rise。主語 The sun が三人称単数で、一般的な事実を表す現在形なので rise → rises になっています。"}, {"id": 13, "jp": "～について話し合う", "answer": "discuss", "basic": "discuss＝「～について話し合う」。discuss 自体に「～について」の意味が含まれます。", "work_en": "They always discuss global warming issues.", "work_ja": "彼らはいつも地球温暖化問題について話し合っている。", "work_form": "discuss", "changed": false, "reason": "discuss がそのまま使われています。about はつけません。主語が They なので現在形も discuss のままです。"}, {"id": 14, "jp": "人に理由を謝る", "answer": "apologize to 人 for 理由", "basic": "apologize to 人 for 理由＝「理由について人に謝る」。", "work_en": "He apologized to the professor for his rude behavior.", "work_ja": "彼は自分の失礼な行動について教授に謝った。", "work_form": "apologized to the professor for his rude behavior", "changed": true, "reason": "基本形は apologize to 人 for 理由。過去の話なので apologize → apologized。人に the professor、理由に his rude behavior が入っています。"}, {"id": 15, "jp": "～に近づく", "answer": "approach", "basic": "approach＝「～に近づく」。approach の直後に近づく対象を置き、to はつけません。", "work_en": "The bus is approaching the station.", "work_ja": "バスは駅に近づいている。", "work_form": "is approaching the station", "changed": true, "reason": "基本形は approach。今まさに近づいている途中なので、現在進行形 is approaching になっています。station の前に to は不要です。"}, {"id": 16, "jp": "～に似ている", "answer": "resemble", "basic": "resemble＝「～に似ている」。resemble の直後に似ている相手を置き、to はつけません。", "work_en": "My brother resembles my cousin.", "work_ja": "私の兄（弟）は、私のいとこに似ている。", "work_form": "resembles my cousin", "changed": true, "reason": "基本形は resemble。主語 My brother が三人称単数なので resemble → resembles。my cousin の前に to は不要です。"}, {"id": 17, "jp": "店などを経営する", "answer": "run", "basic": "run＝「店・会社などを経営する」。run には「走る」以外の意味もあります。", "work_en": "I have an uncle who runs a Japanese restaurant in Chicago.", "work_ja": "私には、シカゴで日本食レストランを経営しているおじがいる。", "work_form": "runs a Japanese restaurant", "changed": true, "reason": "基本形は run。who の先行詞 an uncle が三人称単数なので run → runs になっています。"}, {"id": 18, "jp": "人が～するのを見る", "answer": "see 人 動詞の原形", "basic": "see + 人 + 動詞の原形＝「人が～するのを見る」。動作の一部始終を見たときに使います。", "work_en": "I saw my son come down the stairs and sit at the table.", "work_ja": "私は息子が階段を下りてきて、食卓につくのを見た。", "work_form": "saw my son come", "changed": true, "reason": "see 人 動詞の原形は、「その人が動作するところを最初から最後まで見た」というイメージだよ。\nsee のあとに人を置いて、その人がした動作をそのまま原形で続ける。\nだから saw my son come で「息子が来るのを見た」になる。ワークでは過去なので see → saw になっているよ。"}, {"id": 19, "jp": "人に～させる", "answer": "make 人 動詞の原形", "basic": "make + 人 + 動詞の原形＝「人に～させる」。", "work_en": "My mother made me carry her shopping bag to the parking lot.", "work_ja": "母は私に買い物袋を駐車場まで運ばせた。", "work_form": "made me carry", "changed": true, "reason": "make は、人をぐっと動かして何かをさせるイメージ。\n人を動かしたあと、そのまま次の動作につなげるので to は入らない。\nだから make 人 動詞の原形。ワークでは過去なので make → made になっているよ。"}, {"id": 20, "jp": "人に～させる・してもらう", "answer": "have 人 動詞の原形", "basic": "have + 人 + 動詞の原形＝「人に～させる・してもらう」。", "work_en": "Shall I have him call you when he is back?", "work_ja": "彼が帰ってきたら、あなたに電話させましょうか。", "work_form": "have him call", "changed": false, "reason": "have 人 動詞の原形は、「人にその動作をしてもらう・させる」という形。\nhave のあとに人、そのあとにしてもらう動作を原形で置く。\nhim のあとが call で、to call ではないのがポイントだよ。"}, {"id": 21, "jp": "人を説得して～させる", "answer": "persuade 人 to 動詞", "basic": "persuade + 人 + to 動詞＝「人を説得して～させる」。", "work_en": "I persuaded my father to take me there.", "work_ja": "私は父を説得して、そこへ連れて行ってもらった。", "work_form": "persuaded my father to take", "changed": true, "reason": "基本形は persuade 人 to 動詞。ワークでは過去の話なので persuade → persuaded。人の部分に my father、動詞の部分に take が入っています。"}, {"id": 22, "jp": "お皿を洗いましょうか？", "answer": "Do you want me to wash the dishes?", "basic": "want + 人 + to 動詞＝「人に～してほしい」。疑問文では Do you want ...? の形になります。", "work_en": "Do you want me to wash the dishes?", "work_ja": "お皿を洗いましょうか。", "work_form": "Do you want me to wash the dishes?", "changed": false, "reason": "want 人 to 動詞は、「人にこれから〜してほしい」という形。\nto 動詞はこれからする動作の向きを表すイメージで、me to wash なら「私に洗ってほしい」になる。\nこの問題は日本語全体に合わせて、英文も一文で覚える形だよ。"}, {"id": 23, "jp": "～を聞く", "answer": "listen to", "basic": "listen to ～＝「～を聞く」。listen の後ろには to が必要です。", "work_en": "Listen to me carefully.", "work_ja": "私の話を注意深く聞きなさい。", "work_form": "Listen to", "changed": true, "reason": "基本形は listen to。ワークでは命令文の文頭なので Listen と大文字になっています。"}, {"id": 24, "jp": "話すのをやめてください", "answer": "Please stop talking", "basic": "stop + 動名詞で「～するのをやめる」。", "work_en": "Please stop talking and listen to me.", "work_ja": "話すのをやめて、私の話を聞いてください。", "work_form": "Please stop talking", "changed": false, "reason": "stop doing は、「今やっていることを止める」というイメージ。\ntalking は「話していること」なので、stop talking で「話すのをやめる」になる。\nstop to talk だと「話すために立ち止まる」になって意味が変わるよ。"}, {"id": 25, "jp": "恐れないで", "answer": "Don't be afraid", "basic": "Don't be afraid＝「恐れないで」。否定の命令文は Don't + 動詞の原形です。", "work_en": "Don't be afraid to make mistakes.", "work_ja": "間違えることを恐れないで。", "work_form": "Don't be afraid", "changed": false, "reason": "Don't be afraid がそのまま使われています。否定命令文なので Don't から始まり、be は原形です。"}, {"id": 26, "jp": "～しましょうね", "answer": "Let's ～, shall we?", "basic": "Let's ～, shall we?＝「～しましょうね」。Let's で始めた文の付加疑問は shall we? です。", "work_en": "Let's go for a walk, shall we?", "work_ja": "散歩に行きましょうね。", "work_form": "Let's go for a walk, shall we?", "changed": true, "reason": "基本形の ～ の部分に go for a walk が入っています。Let's で始めたため、後ろは shall we? になります。"}, {"id": 27, "jp": "行くのはやめましょう", "answer": "Let's not go", "basic": "Let's not + 動詞の原形＝「～しないようにしよう」。", "work_en": "Let's not go there today.", "work_ja": "今日はそこへ行くのはやめましょう。", "work_form": "Let's not go", "changed": false, "reason": "Let's not go がそのまま使われています。Let's の後ろに not を置き、go は原形です。"}, {"id": 28, "jp": "～がある（単数）", "answer": "There is", "basic": "There is + 単数名詞＝「～がある」。複数なら There are を使います。", "work_en": "There is a book on the desk.", "work_ja": "机の上に本が1冊あります。", "work_form": "There is", "changed": false, "reason": "There is がそのまま使われています。後ろの a book が単数なので is です。"}, {"id": 29, "jp": "人に～だと約束する", "answer": "promise 人 that ～", "basic": "promise + 人 + that ～＝「人に～だと約束する」。", "work_en": "He promised me that he would come back soon.", "work_ja": "彼はすぐ戻ると私に約束した。", "work_form": "promised me that ～", "changed": true, "reason": "基本形は promise 人 that ～。ワークでは過去の話なので promise → promised。人の部分に me が入り、that の後ろに約束した内容が続きます。"}, {"id": 30, "jp": "～に属する", "answer": "belong to", "basic": "belong to ～＝「～に属する・～のものである」。", "work_en": "The earth belongs to the solar system.", "work_ja": "地球は太陽系に属している。", "work_form": "belongs to", "changed": true, "reason": "belong to は「〜のグループ・持ち主のところに入っている」イメージ。\n地球が太陽系というグループに入っているから belongs to を使う。\nワークでは主語 The earth が1つなので、belong に s がついているよ。"}, {"id": 31, "jp": "連れていく", "answer": "take", "basic": "take＝「連れていく」。if節では、未来のことでも現在形を使います。", "work_en": "If it is sunny tomorrow, I will take you to the park.", "work_ja": "明日晴れたら、あなたを公園へ連れていきます。", "work_form": "take you", "changed": false, "reason": "take がそのまま使われています。will の後ろなので動詞は原形 take です。"}, {"id": 32, "jp": "出席するだろう", "answer": "will attend", "basic": "will + 動詞の原形で未来を表します。attend＝「出席する」。", "work_en": "I don't know if he will attend the meeting.", "work_ja": "彼がその会議に出席するかどうか、私は分かりません。", "work_form": "will attend", "changed": false, "reason": "will attend がそのまま使われています。ここで if は「～なら」ではなく「～かどうか」なので、未来の will を使えます。"}, {"id": 33, "jp": "～を持つ・～を開く", "answer": "have", "basic": "have＝「～を持つ・～を開く」。", "work_en": "We had a party last night.", "work_ja": "私たちは昨夜パーティーを開いた。", "work_form": "had", "changed": false, "reason": "基本形は have。ワークでは昨夜の出来事なので、have → had になっています。"}, {"id": 34, "jp": "演奏している", "answer": "be playing", "basic": "be + 動詞ing＝「～している」。", "work_en": "They are playing music in the next room.", "work_ja": "彼らは隣の部屋で音楽を演奏している。", "work_form": "are playing", "changed": true, "reason": "be + 動詞ing は、動作の途中を切り取るイメージ。\nare playing なら「今まさに演奏している途中」。\n主語が They だから be動詞は are になっているよ。"}, {"id": 35, "jp": "腐る", "answer": "go bad", "basic": "go bad＝「腐る・悪くなる」。", "work_en": "These apples are going bad.", "work_ja": "これらのリンゴは腐りかけている。", "work_form": "are going bad", "changed": true, "reason": "基本形は go bad。今まさに変化している途中なので進行形を使い、主語 These apples が複数なので are going bad になっています。"}, {"id": 36, "jp": "彼女は手を振っていた", "answer": "She was waving her hand", "basic": "She was waving her hand＝「彼女は手を振っていた」。was/were + 動詞ing で過去進行形を表します。", "work_en": "She was waving her hand when I saw her.", "work_ja": "私が彼女を見たとき、彼女は手を振っていた。", "work_form": "She was waving her hand", "changed": false, "reason": "was/were + 動詞ing は、過去のある瞬間に動作の途中だったことを表す。\n「私が見たそのとき、彼女は手を振っている途中だった」という感じ。\nこの問題だけは日本語と情報をそろえるため、She was waving her hand を全文で答えるよ。"}, {"id": 37, "jp": "いつも遅れて来てばかりいる", "answer": "be constantly coming late", "basic": "be constantly + 動詞ingで「いつも～してばかりいる」という不満を表せます。", "work_en": "He is constantly coming late to class.", "work_ja": "彼は授業にいつも遅れて来てばかりいる。", "work_form": "is constantly coming late", "changed": true, "reason": "基本形は be constantly coming late。主語 He が三人称単数なので be動詞が is になっています。"}, {"id": 38, "jp": "～を持っている", "answer": "have", "basic": "have＝「～を持っている」。", "work_en": "The man has a large house near the station.", "work_ja": "その男性は駅の近くに大きな家を持っている。", "work_form": "has", "changed": true, "reason": "基本形は have。主語 The man は三人称単数なので have → has になっています。"}, {"id": 39, "jp": "教えることになっている", "answer": "will be teaching", "basic": "will be + 動詞ingで、未来のある時点でしている動作や予定を表します。", "work_en": "Mr. Brown will be teaching us English next year.", "work_ja": "ブラウン先生は来年、私たちに英語を教えることになっている。", "work_form": "will be teaching", "changed": false, "reason": "will be teaching がそのまま使われています。will be の後ろなので teaching になります。"}, {"id": 40, "jp": "まだ帰宅していない", "answer": "have not come home yet", "basic": "have not + 過去分詞 + yet＝「まだ～していない」。", "work_en": "My brother hasn't come home yet.", "work_ja": "私の兄（弟）はまだ帰宅していない。", "work_form": "hasn't come home yet", "changed": false, "reason": "現在完了は、「過去の出来事を今につなげる」イメージ。\nhave not come home yet は、帰宅していない状態が今も続いているということ。\nワークでは主語 My brother が1人なので have → has になっているよ。"}, {"id": 41, "jp": "ちょうど出発したところだ", "answer": "have just left", "basic": "have just + 過去分詞＝「ちょうど～したところだ」。", "work_en": "The train has just left the station.", "work_ja": "電車はちょうど駅を出たところだ。", "work_form": "has just left", "changed": false, "reason": "have just + 過去分詞は、「たった今終わった出来事を、今の状態として持っている」イメージ。\nだから have just left は「ちょうど出発したところ」になる。\nワークでは主語 The train が1つなので have → has になっているよ。"}, {"id": 42, "jp": "一度も行ったことがない", "answer": "have never been", "basic": "have never been to ～＝「～へ一度も行ったことがない」。", "work_en": "I have never been to Hokkaido to ski.", "work_ja": "私は一度も北海道へスキーに行ったことがない。", "work_form": "have never been", "changed": false, "reason": "have never been to は、「今までを振り返って、一度も行った経験を持っていない」というイメージ。\nnever が「一度も〜ない」、been to が「〜へ行ったことがある」。\n主語が I なので have を使うよ。"}, {"id": 43, "jp": "～の状態が続いている", "answer": "have been", "basic": "have/has been + 名詞・形容詞で「ずっと～である」。", "work_en": "We have been friends for five years.", "work_ja": "私たちは5年間ずっと友人同士だ。", "work_form": "have been friends", "changed": true, "reason": "have been は、過去から今までその状態を持ち続けているイメージ。\nfriends for five years なら「5年間ずっと友達の状態が続いている」。\n過去の一点ではなく、今も続いているのがポイント。"}, {"id": 44, "jp": "～してから○年たった", "answer": "have passed since", "basic": "時間 + have/has passed since ...＝「…してから時間がたった」。", "work_en": "Five years have passed since we became friends.", "work_ja": "私たちが友人になってから5年たった。", "work_form": "Five years have passed since", "changed": true, "reason": "基本形は have passed since。主語 Five years が複数扱いなので have を使い、since の後ろには「友人になった時」の文が続きます。"}, {"id": 45, "jp": "～してから○年になる", "answer": "have been ～ since", "basic": "have been + 時間 + since ～＝「～してから時間になる」。", "work_en": "It has been five years since we became friends.", "work_ja": "私たちが友人になってから5年になる。", "work_form": "It has been five years since", "changed": true, "reason": "基本形は have been ～ since。ワークでは形式主語 It が三人称単数なので、have → has になり、時間の部分に five years が入っています。"}, {"id": 46, "jp": "なくしていた", "answer": "had lost", "basic": "had + 過去分詞＝過去完了。「過去のある時点より前に～していた」。", "work_en": "Did you know that Fred had lost his wallet?", "work_ja": "フレッドが財布をなくしたことを知っていましたか。", "work_form": "had lost", "changed": false, "reason": "had + 過去分詞は、「過去よりさらに前」を表す。\n「知っていた」のも過去だけど、財布をなくしたのはそれより前。\n過去の中で順番をはっきりさせるために had lost を使っているよ。"}, {"id": 47, "jp": "～しなければならない", "answer": "must", "basic": "must + 動詞の原形＝「～しなければならない」。", "work_en": "You must enter your password to access the site.", "work_ja": "そのサイトにアクセスするには、パスワードを入力しなければならない。", "work_form": "must enter", "changed": true, "reason": "基本形 must の後ろに、動詞の原形 enter が続いています。must の後ろでは三単現の s や to はつけません。"}, {"id": 48, "jp": "～でしょう（強い推量）", "answer": "will", "basic": "will は未来だけでなく、現在についての強い推量「～でしょう」にも使えます。", "work_en": "You will have the wrong number. There's no one here by that name.", "work_ja": "番号をお間違えでしょう。そのような名前の人はここにはいません。", "work_form": "will have", "changed": true, "reason": "基本形 will の後ろに動詞の原形 have が続いています。ここでは未来ではなく、状況からの強い推量を表します。"}, {"id": 49, "jp": "～してはいけない", "answer": "may not", "basic": "may not + 動詞の原形＝「～してはいけない」。許可しないことを表します。", "work_en": "You may not smoke in my room.", "work_ja": "私の部屋でたばこを吸ってはいけません。", "work_form": "may not smoke", "changed": true, "reason": "基本形 may not の後ろに動詞の原形 smoke が続いています。ここでは可能性ではなく、禁止を表します。"}, {"id": 50, "jp": "～かもしれない", "answer": "may", "basic": "may + 動詞の原形＝「～かもしれない」。", "work_en": "I may just stay at home because I have nothing to do.", "work_ja": "することがないので、ただ家にいるかもしれない。", "work_form": "may just stay", "changed": true, "reason": "基本形 may の後ろに動詞の原形 stay が続いています。just は「ただ」という意味で may と stay の間に入っています。"}, {"id": 51, "jp": "手伝うことができる", "answer": "can help", "basic": "can + 動詞の原形＝「～することができる」。", "work_en": "Let me know if I can help you.", "work_ja": "もしあなたを手伝えるようなら、知らせてください。", "work_form": "can help", "changed": false, "reason": "can help がそのまま使われています。can の後ろなので help は原形です。"}, {"id": 52, "jp": "～だろうか（ありうるだろうか）", "answer": "Can", "basic": "Can + 主語 + 動詞の原形 ...? で「～ということがありうるだろうか」。", "work_en": "Can her story be true? It sounds unbelievable.", "work_ja": "彼女の話が本当だなんてありうるだろうか。信じられない。", "work_form": "Can her story be true?", "changed": true, "reason": "基本形 Can を文頭に置いた疑問文です。Can の後ろは主語 her story、その後ろに動詞の原形 be が続きます。最後の ? が必要です。"}, {"id": 53, "jp": "～すべきである", "answer": "should be", "basic": "should + 動詞の原形＝「～すべきである」。", "work_en": "You should be seated quietly in the classroom.", "work_ja": "教室では静かに着席しているべきです。", "work_form": "should be seated", "changed": true, "reason": "should は「普通に考えたら、そうするのがよい」というイメージ。\nbe seated は「座らされた状態にいる」から、自然な日本語では「着席している」。\nだから should be seated で「着席しているべきだ」になるよ。"}, {"id": 54, "jp": "荷物を運びましょうか？", "answer": "Could I carry your baggage?", "basic": "Could I + 動詞の原形 ...?＝「～しましょうか」。丁寧な申し出です。", "work_en": "Could I carry your baggage?", "work_ja": "荷物を運びましょうか。", "work_form": "Could I carry your baggage?", "changed": false, "reason": "ワークの英文を一文そのまま答える問題です。Could I の後ろは動詞の原形 carry、最後は ? が必要です。"}, {"id": 55, "jp": "～するのももっともだ", "answer": "might well", "basic": "might well + 動詞の原形＝「～するのももっともだ」。", "work_en": "Young people might well take an interest in the latest fashions.", "work_ja": "若い人たちが最新ファッションに関心を持つのももっともだ。", "work_form": "might well take", "changed": true, "reason": "基本形 might well の後ろに動詞の原形 take が続いています。take an interest in ～で「～に関心を持つ」です。"}, {"id": 56, "jp": "どうしても賛成しようとしない", "answer": "won't agree", "basic": "will not（won't）+ 動詞の原形は、強い意志の否定「どうしても～しようとしない」を表せます。", "work_en": "He won't agree with us on this point.", "work_ja": "彼はこの点について、どうしても私たちに賛成しようとしない。", "work_form": "won't agree", "changed": false, "reason": "won't agree がそのまま使われています。won't の後ろなので agree は原形です。agree with 人で「人に賛成する」です。"}, {"id": 57, "jp": "～しなければならなかった", "answer": "had to", "basic": "had to + 動詞の原形＝「～しなければならなかった」。must の過去にあたる表現です。", "work_en": "Alex had to stay home all day yesterday.", "work_ja": "アレックスは昨日、一日中家にいなければならなかった。", "work_form": "had to stay", "changed": true, "reason": "基本形 had to の後ろに動詞の原形 stay が続いています。yesterday があるため、過去の必要を表します。"}, {"id": 58, "jp": "～しないほうがよい", "answer": "had better not", "basic": "had better not + 動詞の原形＝「～しないほうがよい」。", "work_en": "You had better not eat too much.", "work_ja": "食べ過ぎないほうがよい。", "work_form": "had better not eat", "changed": true, "reason": "had better は、見た目は過去形だけど「〜した方がよい」という1つの表現。\nnot は better のあとに置いて had better not + 動詞の原形。\n「今のうちにそうしない方がいいよ」という少し強めの助言だよ。"}, {"id": 59, "jp": "昔は～だった・～があった", "answer": "used to be", "basic": "used to + 動詞の原形＝「昔は～だった・以前はよく～した」。", "work_en": "Ten years ago, there used to be lots of fish in this lake.", "work_ja": "10年前、この湖にはたくさんの魚がいたものだ。", "work_form": "used to be", "changed": false, "reason": "used to は、「昔はそうだったけど、今は違う」というイメージ。\nthere used to be なら「昔は〜があった・いた」。\nただの過去ではなく、現在との違いを感じさせる表現だよ。"}, {"id": 60, "jp": "～しなければならないだろう", "answer": "will have to", "basic": "will have to + 動詞の原形＝「～しなければならないだろう」。未来の必要を表します。", "work_en": "We will have to buy a new car next year.", "work_ja": "私たちは来年、新しい車を買わなければならないだろう。", "work_form": "will have to buy", "changed": true, "reason": "基本形 will have to の後ろに動詞の原形 buy が続いています。next year があるため、未来の必要を表します。"}, {"id": 61, "jp": "～である", "answer": "be", "basic": "be＝「～である」。主語や時制によって am・is・are・was・were に変化します。", "work_en": "The weather was very cold yesterday.", "work_ja": "昨日はとても寒かった。", "work_form": "was", "changed": false, "reason": "基本形は be。ワークでは主語 The weather が単数で過去の話なので、be → was になっています。"}, {"id": 62, "jp": "未来の時点までに5回行ったことになる", "answer": "will have been", "basic": "will have + 過去分詞で未来完了を表します。", "work_en": "By next month, I will have been to Kyoto five times.", "work_ja": "来月までには、私は京都へ5回行ったことになる。", "work_form": "will have been", "changed": false, "reason": "will have + 過去分詞は、未来のある時点から振り返るイメージ。\n来月の時点で振り返ると、京都へ5回行った経験が完成している。\nだから will have been to になるよ。"}, {"id": 63, "jp": "ずっと探している", "answer": "have been looking", "basic": "have/has been + 動詞ing は現在完了進行形です。", "work_en": "I have been looking for my key since this morning.", "work_ja": "私は今朝からずっと鍵を探している。", "work_form": "have been looking", "changed": false, "reason": "have been looking は、過去から今まで「探す動作」がずっと続いているイメージ。\nhave は今につなげる役、been looking は動作が続いていることを表す。\nsince this morning が「今朝からずっと」をはっきり示しているよ。"}, {"id": 64, "jp": "ずっと待っていた", "answer": "had been waiting", "basic": "had been + 動詞ing は過去完了進行形です。", "work_en": "She had been waiting for him for two hours when he arrived.", "work_ja": "彼が到着したとき、彼女は2時間ずっと彼を待っていた。", "work_form": "had been waiting", "changed": false, "reason": "had been waiting は、過去のある時点まで動作がずっと続いていた形。\n彼が来た時点より前から、2時間待ち続けていた。\n「過去より前から、その過去まで継続」というイメージだよ。"}, {"id": 65, "jp": "～かもしれない", "answer": "might", "basic": "might + 動詞の原形で「～かもしれない」。", "work_en": "It might rain this afternoon.", "work_ja": "今日の午後は雨が降るかもしれない。", "work_form": "might rain", "changed": true, "reason": "基本形 might の後ろに動詞の原形 rain が続いています。"}, {"id": 66, "jp": "～していただけますか？", "answer": "Would you ...?", "basic": "Would you + 動詞の原形 ...? は丁寧な依頼です。", "work_en": "Would you open the window?", "work_ja": "窓を開けていただけますか。", "work_form": "Would you open the window?", "changed": true, "reason": "基本形の ... に open the window が入っています。疑問文なので文頭は Would、最後は ? が必要です。"}, {"id": 67, "jp": "～だったかもしれない", "answer": "might have been", "basic": "might have + 過去分詞で過去の推量を表します。", "work_en": "He might have been sick yesterday.", "work_ja": "彼は昨日、病気だったのかもしれない。", "work_form": "might have been", "changed": false, "reason": "might have + 過去分詞は、過去のことを今から推量する形。\nmight be sick なら今病気かもしれない、might have been sick なら昨日病気だったかもしれない。\nhave が入ることで視線が過去に移るよ。"}, {"id": 68, "jp": "見たはずがない", "answer": "cannot have seen", "basic": "cannot have + 過去分詞で「～したはずがない」。", "work_en": "She cannot have seen the accident.", "work_ja": "彼女がその事故を見たはずがない。", "work_form": "cannot have seen", "changed": false, "reason": "cannot have + 過去分詞は、「過去にそんなことをしたはずがない」という強い否定。\n今の情報から過去を振り返って否定している。\nsee の過去分詞は seen なので cannot have seen になるよ。"}, {"id": 69, "jp": "受け取っているはずだ", "answer": "should have received", "basic": "should have + 過去分詞で「～したはずだ」。", "work_en": "He should have received my letter by now.", "work_ja": "彼はもう私の手紙を受け取っているはずだ。", "work_form": "should have received", "changed": false, "reason": "should have + 過去分詞は、「普通ならもう〜したはずだ」と過去について考える形。\nby now が「今ごろまでには」という目印。\nreceive の過去分詞 received を使うよ。"}, {"id": 70, "jp": "放送される", "answer": "be shown", "basic": "be + 過去分詞は受動態です。show の過去分詞は shown。", "work_en": "The program is shown every Sunday.", "work_ja": "その番組は毎週日曜日に放送される。", "work_form": "is shown", "changed": true, "reason": "受動態は、主語が動作をする側ではなく、影響を受ける側になる形。\n番組は自分で放送するのではなく、放送される側だよね。\nだから be + shown。ワークでは現在・単数なので is shown になっているよ。"}, {"id": 71, "jp": "発明される", "answer": "be invented", "basic": "be invented＝「発明される」。be + 過去分詞で受動態を表します。", "work_en": "The telephone was invented by Alexander Graham Bell.", "work_ja": "電話はアレクサンダー・グラハム・ベルによって発明された。", "work_form": "was invented", "changed": false, "reason": "電話は自分で発明するわけではなく、誰かに発明される側。\nだから be + invented という受動態になる。\nワークでは過去の出来事で主語も単数だから be → was だよ。"}, {"id": 72, "jp": "設計される", "answer": "be designed", "basic": "be designed＝「設計される」。be + 過去分詞で受動態を表します。", "work_en": "This building was designed by a famous architect.", "work_ja": "この建物は有名な建築家によって設計された。", "work_form": "was designed", "changed": false, "reason": "基本形は be designed。ワークでは過去の出来事で主語 This building が単数なので、be → was になっています。"}, {"id": 73, "jp": "使われている", "answer": "be used", "basic": "be used で「使われている」。", "work_en": "These machines are used in many factories.", "work_ja": "これらの機械は多くの工場で使われている。", "work_form": "are used", "changed": true, "reason": "基本形は be used。主語 These machines が複数なので、be動詞が are になっています。"}, {"id": 74, "jp": "すでに洗われている", "answer": "have already been washed", "basic": "have/has been + 過去分詞は現在完了の受動態です。", "work_en": "The dishes have already been washed.", "work_ja": "皿はすでに洗われている。", "work_form": "have already been washed", "changed": false, "reason": "have been + 過去分詞は、現在完了と受動態を合体させた形。\n皿は洗う側ではなく洗われる側で、しかもその結果が今も残っている。\nだから have already been washed で「すでに洗われている」になるよ。"}, {"id": 75, "jp": "演奏されている途中である", "answer": "be being played", "basic": "be being played＝「演奏されている途中である」。進行形の受動態です。", "work_en": "The piano was being played when I entered the room.", "work_ja": "私が部屋に入ったとき、ピアノが演奏されていた。", "work_form": "was being played", "changed": false, "reason": "was being played は、「過去のその瞬間、演奏されている途中だった」。\nbeing が進行中、played が受け身を表す。\n少し長いけど、was + being + 過去分詞に分けると見やすいよ。"}, {"id": 76, "jp": "されなければならない", "answer": "must be done", "basic": "助動詞 + be + 過去分詞は助動詞を使った受動態です。", "work_en": "This work must be done by tomorrow.", "work_ja": "この仕事は明日までに終えられなければならない。", "work_form": "must be done", "changed": false, "reason": "must be done は、must と受動態の組み合わせ。\n仕事は自分でする側ではなく、される側だから be done。\nmust の後ろは動詞の原形なので be のままになるよ。"}, {"id": 77, "jp": "修理されますか？", "answer": "Will it be fixed?", "basic": "will be + 過去分詞で未来の受動態を表します。", "work_en": "Will it be fixed by tomorrow?", "work_ja": "それは明日までに修理されますか。", "work_form": "Will it be fixed by tomorrow?", "changed": true, "reason": "基本形 will be fixed を疑問文にするため Will を文頭に置いています。最後は ? が必要です。"}, {"id": 78, "jp": "この小説は誰によって書かれましたか？", "answer": "Who was this novel written by?", "basic": "Who + be動詞 + 主語 + 過去分詞 + by? の形です。", "work_en": "Who was this novel written by?", "work_ja": "この小説は誰によって書かれましたか。", "work_form": "Who was this novel written by?", "changed": false, "reason": "ワークの英文を一文そのまま答える問題です。write の過去分詞は written。最後は ? が必要です。"}, {"id": 79, "jp": "驚いた", "answer": "surprised", "basic": "surprised は人の感情「驚いた」を表します。", "work_en": "I was surprised at the news.", "work_ja": "私はその知らせに驚いた。", "work_form": "was surprised", "changed": true, "reason": "基本形は surprised。ワークでは「驚いた状態だった」ので be動詞 was と一緒に使われています。"}, {"id": 80, "jp": "戦争で命を落とす・殺される", "answer": "be killed in the war", "basic": "be killed in the war＝「戦争で命を落とす・殺される」。", "work_en": "Many people were killed in the war.", "work_ja": "多くの人々がその戦争で亡くなった。", "work_form": "were killed in the war", "changed": false, "reason": "基本形は be killed in the war。ワークでは主語 Many people が複数で過去の話なので、be → were になっています。"}, {"id": 81, "jp": "～に知られている", "answer": "be known to", "basic": "be known to 人＝「人に知られている」。", "work_en": "This song is known to many people.", "work_ja": "この歌は多くの人に知られている。", "work_form": "is known to", "changed": true, "reason": "基本形は be known to。主語 This song が単数なので be動詞が is になっています。"}, {"id": 82, "jp": "～でけがをした", "answer": "be injured in", "basic": "be injured in + 事故など＝「～でけがをする」。", "work_en": "He was injured in the accident.", "work_ja": "彼はその事故でけがをした。", "work_form": "was injured in", "changed": true, "reason": "基本形は be injured in。過去の出来事で主語 He が単数なので、be動詞が was になっています。"}, {"id": 83, "jp": "尊敬されている", "answer": "be looked up to", "basic": "look up to＝「～を尊敬する」。受動態では be looked up to。", "work_en": "The teacher is looked up to by all the students.", "work_ja": "その先生は生徒全員から尊敬されている。", "work_form": "is looked up to", "changed": true, "reason": "基本形は be looked up to。主語 The teacher が単数で現在の状態を表すため、be動詞が is になっています。"}, {"id": 84, "jp": "育てられる", "answer": "be brought up", "basic": "bring up＝「育てる」。受動態では be brought up。", "work_en": "He was brought up by his grandparents.", "work_ja": "彼は祖父母に育てられた。", "work_form": "was brought up", "changed": true, "reason": "基本形は be brought up。過去の出来事で主語 He が単数なので、be動詞が was になっています。"}, {"id": 85, "jp": "～であると言われている", "answer": "be said to be", "basic": "be said to be＝「～であると言われている」。", "work_en": "He is said to be a great scientist.", "work_ja": "彼は偉大な科学者だと言われている。", "work_form": "is said to be", "changed": true, "reason": "基本形は be said to be。主語 He が単数なので、be動詞が is になっています。"}, {"id": 86, "jp": "待たされる", "answer": "be made to wait", "basic": "be made to wait＝「待たされる」。make 人 wait の受動態では to が復活します。", "work_en": "I was made to wait for a long time.", "work_ja": "私は長い間待たされた。", "work_form": "was made to wait", "changed": false, "reason": "能動態では make 人 動詞の原形だけど、受動態になると to が戻る。\nI was made to wait は「私は待つようにさせられた」から、自然には「待たされた」。\nここはテストでかなり狙われやすいポイントだよ。"}, {"id": 87, "jp": "よく売れる", "answer": "sell well", "basic": "sell well＝「よく売れる」。物が自然に売れる意味では受動態にしません。", "work_en": "This book sells well.", "work_ja": "この本はよく売れる。", "work_form": "sells well", "changed": true, "reason": "基本形は sell well。主語 This book が三人称単数なので、sell → sells になっています。"}, {"id": 88, "jp": "買いたがっている", "answer": "want to buy", "basic": "want to + 動詞の原形＝「～したい」。", "work_en": "She wants to buy a new bag.", "work_ja": "彼女は新しいバッグを買いたがっている。", "work_form": "wants to buy", "changed": true, "reason": "基本形は want to buy。主語 She が三人称単数なので、want → wants になっています。"}, {"id": 89, "jp": "助けること", "answer": "to help", "basic": "to + 動詞の原形で、不定詞の名詞用法「～すること」を表します。", "work_en": "To help others is important.", "work_ja": "他人を助けることは大切だ。", "work_form": "To help", "changed": true, "reason": "to help は「助けること」として文全体の主語になっている。\nto do は、これからすること・目的に向かうイメージを持つと分かりやすい。\n文頭なので To は大文字だよ。"}, {"id": 90, "jp": "野球をするのは楽しい", "answer": "It is fun to play baseball", "basic": "It is + 形容詞 + to 動詞で「～することは…だ」。", "work_en": "It is fun to play baseball.", "work_ja": "野球をするのは楽しい。", "work_form": "It is fun to play baseball", "changed": false, "reason": "本当の主語は to play baseball だけど、長い主語を文頭に置くと重い。\nそこで最初に仮の It を置いて、あとから本当の内容を説明している。\nIt is fun to play baseball は「野球をすることは楽しい」になるよ。"}, {"id": 91, "jp": "他人に親切にすることは大切だと思う", "answer": "I find it important to be kind to others", "basic": "find it + 形容詞 + to 動詞で「～することは…だと思う」。", "work_en": "I find it important to be kind to others.", "work_ja": "他人に親切にすることは大切だと思う。", "work_form": "I find it important to be kind to others", "changed": false, "reason": "find it + 形容詞 + to do は、まず it を仮の目的語として置く形。\n本当に「大切だ」と感じている内容は to be kind to others。\n長い内容を後ろに回して、英語を読みやすくしているよ。"}, {"id": 92, "jp": "準備するために", "answer": "to prepare", "basic": "目的を表す to不定詞で「～するために」。", "work_en": "I got up early to prepare for the test.", "work_ja": "私はテストの準備をするために早起きした。", "work_form": "to prepare", "changed": false, "reason": "to prepare は「準備するために」という目的を表す。\n早起きした、その先の目的が準備すること。\nto は矢印のように「その行動の目的へ向かう」と考えると分かりやすいよ。"}, {"id": 93, "jp": "見つけて驚いた", "answer": "to find", "basic": "感情の原因を表す to不定詞で「～して驚いた」。", "work_en": "I was surprised to find the door open.", "work_ja": "私はドアが開いているのを見つけて驚いた。", "work_form": "to find", "changed": false, "reason": "感情のあとに to do が来ると、「何をしてその感情になったか」を説明できる。\nsurprised to find なら「見つけて驚いた」。\n驚いた原因が to find 以下に書かれているよ。"}, {"id": 94, "jp": "成長して～になる", "answer": "grow up to be", "basic": "grow up to be＝「成長して～になる」。", "work_en": "He grew up to be a famous doctor.", "work_ja": "彼は成長して有名な医者になった。", "work_form": "grew up to be", "changed": false, "reason": "基本形は grow up to be。ワークでは過去の話なので、grow → grew になっています。"}, {"id": 95, "jp": "開けっぱなしにする", "answer": "leave ... open", "basic": "leave + 物 + 形容詞で「物を～の状態にしておく」。", "work_en": "Don't leave the door open.", "work_ja": "ドアを開けっぱなしにしないで。", "work_form": "leave the door open", "changed": true, "reason": "基本形は leave ... open。ワークでは ... の部分に the door が入っています。Don't の後ろなので leave は原形です。"}, {"id": 96, "jp": "～したが、結局…だった", "answer": "only to find", "basic": "only to + 動詞で、予想外の結果「しかし結局～だった」を表します。", "work_en": "He hurried to the station, only to find that the train had left.", "work_ja": "彼は駅へ急いだが、電車が出たあとだと分かった。", "work_form": "only to find", "changed": false, "reason": "only to find がそのまま使われています。目的ではなく、予想外の結果を表します。"}, {"id": 97, "jp": "そして二度と戻らなかった", "answer": "never to return", "basic": "never to + 動詞の原形で「そして二度と～しなかった」。", "work_en": "He left his hometown, never to return.", "work_ja": "彼は故郷を離れ、二度と戻らなかった。", "work_form": "never to return", "changed": false, "reason": "never to return がそのまま使われています。前の出来事に続く結果を表します。"}, {"id": 98, "jp": "～する予定だ", "answer": "be to + 動詞", "basic": "be to + 動詞の原形で予定を表します。", "work_en": "The president is to make a speech tomorrow.", "work_ja": "大統領は明日演説をする予定だ。", "work_form": "is to make", "changed": true, "reason": "be to + 動詞は、予定・義務などを少し固めに表す形。\nここでは「大統領が演説する予定が決まっている」という感じ。\n主語が単数なので be は is になっているよ。"}, {"id": 99, "jp": "記入されること", "answer": "to be filled out", "basic": "to be + 過去分詞で、不定詞の受動態を表します。fill out＝「記入する」。", "work_en": "This form needs to be filled out.", "work_ja": "この用紙は記入される必要がある。", "work_form": "to be filled out", "changed": false, "reason": "to be filled out は、to不定詞の受動態。\n用紙は記入する側ではなく、記入される側だよね。\nだから to fill out ではなく to be filled out になるよ。"}, {"id": 100, "jp": "好きになる", "answer": "come to like", "basic": "come to + 動詞の原形で「だんだん～するようになる」。", "work_en": "I came to like classical music.", "work_ja": "私はクラシック音楽が好きになった。", "work_form": "came to like", "changed": true, "reason": "基本形は come to like。過去の話なので、come → came になっています。"}, {"id": 101, "jp": "偶然～した", "answer": "happen to 動詞", "basic": "happen to + 動詞の原形＝「偶然～する」。", "work_en": "They happened to discover they had a friend in common.", "work_ja": "彼らは自分たちに共通の友人がいることを偶然知った。", "work_form": "happened to discover", "changed": true, "reason": "基本形は happen to 動詞。ワークでは過去の話なので happen → happened。動詞の部分には discover が入っています。"}, {"id": 102, "jp": "～を知っているようだった", "answer": "seem to know", "basic": "seem to + 動詞の原形＝「～するようだ」。", "work_en": "She seemed to know everything about the story.", "work_ja": "彼女はその物語について何でも知っているようだった。", "work_form": "seemed to know", "changed": true, "reason": "基本形は seem to know。過去の話なので seem → seemed になっています。"}, {"id": 103, "jp": "～だと分かった", "answer": "turn out to be", "basic": "turn out to be＝「～だと分かる・判明する」。", "work_en": "The medicine turned out to be effective against the flu.", "work_ja": "その薬はインフルエンザに効き目があることが分かった。", "work_form": "turned out to be", "changed": true, "reason": "基本形は turn out to be。過去の話なので turn → turned になっています。"}, {"id": 104, "jp": "描いたようだ", "answer": "to have drawn", "basic": "to have + 過去分詞で、主節より前に起きたことを表します。", "work_en": "Roy seems to have drawn this picture.", "work_ja": "ロイがこの絵を描いたようだ。", "work_form": "to have drawn", "changed": false, "reason": "to have drawn は、seems より前に絵を描いたことを表す。\n今「そう見える」けど、描いたのはすでに過去。\nto have + 過去分詞で、主節より前の出来事を表せるよ。"}, {"id": 105, "jp": "何をすべきか", "answer": "what to do", "basic": "疑問詞 + to 動詞＝「何を・どこで・どうやって～すべきか」。", "work_en": "She was so upset that she did not know what to do.", "work_ja": "彼女はとても動揺して、何をすべきか分からなかった。", "work_form": "what to do", "changed": false, "reason": "what to do は、「何をするべきか」をひとまとめにした形。\nwhat が「何を」、to do が「するべきか」。\n疑問文そのものではなく、文の中に入る小さな疑問のかたまりだよ。"}, {"id": 106, "jp": "どこへ行くべきか", "answer": "where to go", "basic": "where to + 動詞の原形＝「どこへ～すべきか」。", "work_en": "Aki hasn't decided where to go for her summer vacation.", "work_ja": "アキは夏休みにどこへ行くか決めていない。", "work_form": "where to go", "changed": false, "reason": "where to go がそのまま使われています。where の後ろに to go を置いて「どこへ行くべきか」を表します。"}, {"id": 107, "jp": "必ず明かりを消しなさい", "answer": "Be sure to put out the light", "basic": "be sure to + 動詞の原形＝「必ず～しなさい」。put out the light＝「明かりを消す」。", "work_en": "Be sure to put out the light before you go to bed.", "work_ja": "寝る前に必ず明かりを消しなさい。", "work_form": "Be sure to put out the light", "changed": false, "reason": "ワークの表現がそのまま使われています。命令文なので Be は大文字で始めます。"}, {"id": 108, "jp": "克服するのが難しい", "answer": "difficult to overcome", "basic": "形容詞 + to 動詞で「～するのが…だ」。overcome＝「克服する」。", "work_en": "Your problem is not difficult to overcome.", "work_ja": "あなたの問題は克服するのが難しくない。", "work_form": "difficult to overcome", "changed": false, "reason": "difficult to overcome がそのまま使われています。to overcome が「何をするのが難しいか」を説明しています。"}, {"id": 109, "jp": "～するのを楽しみにしている", "answer": "look forward to 動名詞", "basic": "look forward to + 名詞・動名詞＝「～を楽しみにする」。この to は前置詞です。", "work_en": "Many foreign visitors are looking forward to visiting landscape gardens in Kyoto.", "work_ja": "多くの外国人観光客が京都の日本庭園を訪れるのを楽しみにしている。", "work_form": "are looking forward to visiting", "changed": true, "reason": "look forward to は「〜を楽しみに待つ」という1つの熟語。\n楽しみにしているのは「訪れる」という動詞そのものではなく、「訪れること」という出来事だよね。\n英語では「〜すること」を ～ing で表せるので、to の後ろは visiting になる。ここでの to は熟語の一部で、to visit の to不定詞とは別物だよ。"}, {"id": 110, "jp": "～するのに十分…だ", "answer": "enough to", "basic": "形容詞・副詞 + enough to 動詞＝「～するのに十分…だ」。", "work_en": "Luckily, the dolphin got strong enough to be released into the ocean again.", "work_ja": "幸運にも、そのイルカは再び海へ放されるのに十分なほど元気になった。", "work_form": "strong enough to be released", "changed": true, "reason": "enough to は、「〜するのに十分」という形。\nstrong enough で「十分に強い」、その強さで何ができるかを to 以下で説明する。\nイルカは放す側ではなく放される側なので to be released になっているよ。"}, {"id": 111, "jp": "疲れすぎて一生懸命勉強できない", "answer": "too tired to study hard", "basic": "too + 形容詞 + to 動詞＝「～すぎて…できない」。", "work_en": "I was too tired to study hard for the rest of the day.", "work_ja": "私は疲れすぎて、その日の残りは一生懸命勉強できなかった。", "work_form": "too tired to study hard", "changed": false, "reason": "too ... to do は、「〜すぎて、その先の動作まで届かない」イメージ。\ntoo tired で疲れが限界を超えて、to study hard まで行けない。\nだから「疲れすぎて勉強できない」になるよ。"}, {"id": 112, "jp": "言うまでもなく", "answer": "Needless to say", "basic": "Needless to say＝「言うまでもなく」。文全体を修飾する決まり表現です。", "work_en": "Needless to say, practice is important.", "work_ja": "言うまでもなく、練習は大切だ。", "work_form": "Needless to say", "changed": false, "reason": "Needless to say がそのまま使われています。文頭なので Needless は大文字です。"}, {"id": 113, "jp": "正直に言うと", "answer": "To be honest", "basic": "To be honest＝「正直に言うと」。文全体を修飾する決まり表現です。", "work_en": "To be honest, I don't like the movie very much.", "work_ja": "正直に言うと、私はその映画があまり好きではない。", "work_form": "To be honest", "changed": false, "reason": "To be honest がそのまま使われています。文頭なので To は大文字です。"}, {"id": 114, "jp": "実を言うと", "answer": "To tell the truth", "basic": "To tell the truth＝「実を言うと」。文全体を修飾する決まり表現です。", "work_en": "To tell the truth, it does not always pay to tell the truth.", "work_ja": "実を言うと、真実を言うことがいつも割に合うとは限らない。", "work_form": "To tell the truth", "changed": false, "reason": "To tell the truth がそのまま使われています。文頭なので To は大文字です。"}, {"id": 115, "jp": "鳥を見ること", "answer": "watching birds", "basic": "動名詞は「～すること」を表し、文の主語にもなれます。", "work_en": "Watching birds gives me great pleasure.", "work_ja": "鳥を見ることは私に大きな楽しみを与えてくれる。", "work_form": "Watching birds", "changed": true, "reason": "動詞に ing をつけると、「〜すること」という出来事として扱える。\nwatching birds は「鳥を見ること」という1つのまとまりで、文の主語になっている。\n主語としては1つの出来事なので、動詞は gives になるよ。"}, {"id": 116, "jp": "熱いお風呂に入ること", "answer": "taking a hot bath", "basic": "動名詞 taking は「入ること」を表します。take a bath＝「風呂に入る」。", "work_en": "I like taking a hot bath.", "work_ja": "私は熱いお風呂に入るのが好きだ。", "work_form": "taking a hot bath", "changed": false, "reason": "taking a hot bath がそのまま使われています。like の後ろに動名詞を置いて「～するのが好きだ」を表します。"}, {"id": 117, "jp": "アクセサリーを作ること", "answer": "making accessories", "basic": "動名詞 making は「作ること」を表します。", "work_en": "My hobby is making accessories.", "work_ja": "私の趣味はアクセサリーを作ることだ。", "work_form": "making accessories", "changed": false, "reason": "making accessories がそのまま使われています。be動詞の後ろで、趣味の内容を説明しています。"}, {"id": 118, "jp": "たばこを吸うのをやめる", "answer": "stop smoking", "basic": "stop + 動名詞＝「～するのをやめる」。", "work_en": "People are giving up smoking these days.", "work_ja": "近ごろ、人々はたばこを吸うのをやめている。", "work_form": "giving up smoking", "changed": true, "reason": "stop doing は、今している動作を止める形。\nsmoking は「たばこを吸うこと」なので stop smoking で「喫煙をやめる」。\nワークでは同じ意味の give up smoking が使われているよ。"}, {"id": 119, "jp": "弁護士になることを決める", "answer": "decide to become", "basic": "decide to + 動詞の原形＝「～することを決める」。", "work_en": "I've decided to become a lawyer.", "work_ja": "私は弁護士になることを決めた。", "work_form": "decided to become", "changed": true, "reason": "decide to do は、「これからすることを決める」。\nto do はこれから向かう行動のイメージだから、将来なる職業にも合う。\nワークでは決めた結果が今も有効なので I've decided になっているよ。"}, {"id": 120, "jp": "話すのをやめる", "answer": "quit talking", "basic": "quit + 動名詞＝「～するのをやめる」。", "work_en": "I asked them to quit talking in the library.", "work_ja": "私は彼らに図書館で話すのをやめるよう頼んだ。", "work_form": "quit talking", "changed": false, "reason": "quit doing は、今していることをやめる形。\ntalking は「話していること」なので quit talking。\nquit to talk とは言わないので、ここはセットで覚えよう。"}, {"id": 121, "jp": "なんとか～を解決する", "answer": "manage to solve", "basic": "manage to solve＝「なんとか～を解決する・解決することができる」。", "work_en": "We managed to solve the problem without your help.", "work_ja": "私たちはあなたの助けなしで、その問題を解決することができた。", "work_form": "managed to solve", "changed": false, "reason": "基本形は manage to solve。ワークでは過去の話なので、manage → managed になっています。"}, {"id": 122, "jp": "仕事に行くのを避ける", "answer": "avoid going", "basic": "avoid + 動名詞＝「～するのを避ける」。", "work_en": "I usually avoid going to work during rush hours.", "work_ja": "私はたいてい、ラッシュアワーに仕事へ行くのを避けている。", "work_form": "avoid going", "changed": false, "reason": "avoid going がそのまま使われています。avoid の後ろは to go ではなく going です。"}, {"id": 123, "jp": "～を知っているふりをする", "answer": "pretend to know", "basic": "pretend to know＝「～を知っているふりをする」。", "work_en": "He pretended to know nothing.", "work_ja": "彼は何も知らないふりをした。", "work_form": "pretended to know", "changed": false, "reason": "基本形は pretend to know。ワークでは過去の話なので、pretend → pretended になっています。"}, {"id": 124, "jp": "～を盗んだことを認める", "answer": "admit having stolen", "basic": "admit having stolen＝「～を盗んだことを認める」。", "work_en": "He admitted having stolen some money from the safe.", "work_ja": "彼は金庫からお金を盗んだことを認めた。", "work_form": "admitted having stolen", "changed": false, "reason": "admit doing は、「実際にしたことを認める」。\nさらに having stolen にすると、盗んだのが認めた時より前だとはっきり示せる。\n過去の順番まで見せたいので having + 過去分詞を使っているよ。"}, {"id": 125, "jp": "雷鳴を聞くことを予想する", "answer": "expect to hear", "basic": "expect to + 動詞の原形＝「～することを予想する」。", "work_en": "People usually expect to hear thunder after they see lightning.", "work_ja": "人々は普通、稲妻を見たあとに雷鳴を聞くものだと予想する。", "work_form": "expect to hear", "changed": false, "reason": "expect to hear がそのまま使われています。expect の後ろは hearing ではなく to hear です。"}, {"id": 126, "jp": "～を見るのを楽しむ", "answer": "enjoy watching", "basic": "enjoy watching＝「～を見るのを楽しむ」。", "work_en": "We enjoyed watching TV last night.", "work_ja": "私たちは昨夜、テレビを見るのを楽しんだ。", "work_form": "enjoyed watching", "changed": false, "reason": "基本形は enjoy watching。ワークでは過去の話なので、enjoy → enjoyed になっています。"}, {"id": 127, "jp": "～を聞くことを拒む", "answer": "refuse to listen", "basic": "refuse to listen＝「～を聞くことを拒む」。", "work_en": "He refused to listen to them.", "work_ja": "彼は彼らの話を聞くことを拒んだ。", "work_form": "refused to listen", "changed": false, "reason": "基本形は refuse to listen。ワークでは過去の話なので、refuse → refused になっています。"}, {"id": 128, "jp": "～を読み終える", "answer": "finish reading", "basic": "finish reading＝「～を読み終える」。", "work_en": "I finished reading the book yesterday morning.", "work_ja": "私は昨日の朝、その本を読み終えた。", "work_form": "finished reading", "changed": false, "reason": "基本形は finish reading。ワークでは過去の話なので、finish → finished になっています。"}, {"id": 129, "jp": "カナダで働くことを考えたことがありますか？", "answer": "Have you ever considered working in Canada?", "basic": "consider + 動名詞＝「～することを検討する・考える」。", "work_en": "Have you ever considered working in Canada?", "work_ja": "カナダで働くことを考えたことがありますか。", "work_form": "Have you ever considered working in Canada?", "changed": false, "reason": "consider doing は、「〜することを考える」。\n考えている対象は work という動詞そのものではなく、「働くこと」という出来事。\nだから working を使い、to work にはしないよ。"}, {"id": 130, "jp": "人を泣かせるつもりである", "answer": "mean to make 人 cry", "basic": "mean to make 人 cry＝「人を泣かせるつもりである」。", "work_en": "I'm terribly sorry, but I didn't mean to make you cry.", "work_ja": "本当にごめんなさい。あなたを泣かせるつもりではありませんでした。", "work_form": "didn't mean to make you cry", "changed": false, "reason": "基本形は mean to make 人 cry。ワークでは否定の過去形だったため didn't mean となり、人の部分には you が入っています。"}, {"id": 131, "jp": "忘れずに彼のオフィスへ立ち寄る", "answer": "remember to stop", "basic": "remember to + 動詞の原形＝「忘れずに～する」。stop by＝「立ち寄る」。", "work_en": "Please remember to stop by his office before you go home.", "work_ja": "家に帰る前に、忘れずに彼のオフィスへ立ち寄ってください。", "work_form": "remember to stop", "changed": false, "reason": "remember to do は、「これからすることを忘れない」。\nまだ立ち寄っていないから to stop。\nremember doing なら「立ち寄ったことを覚えている」で、もうしたことになるよ。"}, {"id": 132, "jp": "残念ながら～とお伝えする", "answer": "regret to tell", "basic": "regret to + 動詞の原形＝「残念ながら～する」。これから伝える悪い知らせに使います。", "work_en": "We regret to tell you that you did not win the contest.", "work_ja": "残念ながら、あなたはコンテストで優勝しなかったことをお伝えします。", "work_form": "regret to tell", "changed": false, "reason": "regret to do は、「残念だけど、これからそのことを伝える」。\nまだ伝える前なので to tell。\nregret doing なら「してしまったことを後悔する」で、もう終わった出来事になるよ。"}, {"id": 133, "jp": "～に話しかけようとする", "answer": "try to speak", "basic": "try to speak＝「～に話しかけようとする・話そうと試みる」。", "work_en": "I tried to speak to her, but she did not like what I said.", "work_ja": "私は彼女に話しかけてみたが、彼女は私の言ったことが気に入らなかった。", "work_form": "tried to speak", "changed": false, "reason": "try to do は、「実際にやろうと努力する・試みる」。\ntry doing は「試しにやってみる」という軽い実験の感じ。\nワークでは彼女に話しかけようとしたので tried to speak だよ。"}, {"id": 134, "jp": "少しの間、私があなたに話しかけてもかまいませんか？", "answer": "Would you mind my talking to you for a while?", "basic": "Would you mind + 所有格・目的格 + 動名詞?＝「人が～してもかまいませんか」。", "work_en": "Would you mind my talking to you for a while?", "work_ja": "少しの間、私があなたに話しかけてもかまいませんか。", "work_form": "Would you mind my talking to you for a while?", "changed": false, "reason": "Would you mind ～ing? は、「〜することを気にしますか」から「〜してもいいですか」という丁寧な聞き方。\ntalking は「話しかけること」という出来事。\nmy talking は少しかため、me talking は会話でよく使われるよ。", "aliases": ["Would you mind me talking to you for a while?"]}, {"id": 135, "jp": "おばから連絡がないこと", "answer": "not hearing", "basic": "前置詞 about の後ろには動名詞を置きます。not + 動名詞で「～しないこと」。", "work_en": "I'm worried about not hearing from my aunt.", "work_ja": "私はおばから連絡がないことを心配している。", "work_form": "not hearing", "changed": false, "reason": "前置詞 about の後ろには、名詞のようなかたまりが必要。\nhear は動詞のままでは置けないので、「聞くこと」を表す hearing にする。\nnot hearing で「連絡がないこと」になるよ。"}, {"id": 136, "jp": "母親を悲しませたこと", "answer": "having made", "basic": "having + 過去分詞は、主節より前に起きたことを表す完了動名詞です。", "work_en": "Ryo isn't aware of having made his mother sad.", "work_ja": "亮は母親を悲しませたことに気づいていない。", "work_form": "having made", "changed": false, "reason": "having made は、気づいていない今より前に、母親を悲しませたことを表す。\nhaving + 過去分詞で「すでに〜したこと」。\nmake 人 形容詞で「人を〜な気持ちにする」という形も入っているよ。"}, {"id": 137, "jp": "メグと呼ばれること", "answer": "being called", "basic": "being + 過去分詞は動名詞の受動態で、「～されること」。", "work_en": "She is fond of being called Meg.", "work_ja": "彼女はメグと呼ばれるのが好きだ。", "work_form": "being called", "changed": false, "reason": "being called は、「呼ばれること」。\n彼女は呼ぶ側ではなく、呼ばれる側だから受動態になる。\n動名詞と受動態を合わせて being + 過去分詞にしているよ。"}, {"id": 138, "jp": "日本へ招待されること", "answer": "being invited", "basic": "being + 過去分詞は動名詞の受動態です。look forward to の to は前置詞なので、後ろに動名詞を置きます。", "work_en": "She was looking forward to being invited to Japan.", "work_ja": "彼女は日本へ招待されるのを楽しみにしていた。", "work_form": "being invited", "changed": false, "reason": "look forward to の後ろには、「楽しみにしている出来事」を置く。\ninvite は「招待する」だけど、彼女は招待される側なので being invited。\n「〜されること」を表す being + 過去分詞が必要だよ。"}];let pool=[],wrongNext=[],index=0,round=1,current,answered=false,firstTotal=0,firstCorrect=0;const $=id=>document.getElementById(id);
function norm(t){return t.trim().replace(/　/g," ").replace(/\s+/g," ").replace(/[.]$/,"")}
function start(){
  const startValue = Number($("startNo").value);
  const endValue = Number($("endNo").value);
  const error = $("rangeError");

  if (!Number.isInteger(startValue) || !Number.isInteger(endValue)) {
    error.textContent = "開始番号と終了番号は整数で入力してください。";
    error.style.display = "block";
    return;
  }
  if (startValue < 1 || startValue > 138 || endValue < 1 || endValue > 138) {
    error.textContent = "問題番号は1〜138の範囲で指定してください。";
    error.style.display = "block";
    return;
  }
  if (startValue > endValue) {
    error.textContent = "開始番号は終了番号以下にしてください。";
    error.style.display = "block";
    return;
  }

  error.style.display = "none";
  pool = QUESTIONS.filter(q => q.id >= startValue && q.id <= endValue);
  wrongNext = [];
  index = 0;
  round = 1;
  firstTotal = pool.length;
  firstCorrect = 0;
  $("setup").classList.add("hidden");
  $("finish").classList.add("hidden");
  $("game").classList.remove("hidden");
  show();
}
function show(){current=pool[index];answered=false;$("roundText").textContent=round===1?"1周目":round+"周目（復習）";$("progress").textContent=(index+1)+" / "+pool.length+"　問題"+current.id;$("jp").textContent=current.jp;$("answer").value="";$("answer").disabled=false;$("result").style.display="none";$("nextBtn").classList.add("hidden");$("banner").classList.add("hidden");setTimeout(()=>$("answer").focus(),100)}
function correct(t,a){let nt=t.trim().replace(/　/g," ").replace(/\s+/g," "),na=a.trim().replace(/　/g," ").replace(/\s+/g," ");return a.endsWith("?")?nt===na:norm(nt)===norm(na)}
function check(){if(answered||!$("answer").value.trim())return;let ok=correct($("answer").value,current.answer)||(current.aliases||[]).some(a=>correct($("answer").value,a));answered=true;if(round===1&&ok)firstCorrect++;if(!ok&&!wrongNext.some(q=>q.id===current.id))wrongNext.push(current);$("result").className="result "+(ok?"ok":"ng");$("result").style.display="block";$("judge").textContent=ok?"⭕ 正解！":"❌ 不正解";$("correct").textContent="正解："+current.answer;$("basic").textContent=current.basic;$("workEn").textContent=current.work_en;$("workJa").textContent="（"+current.work_ja+"）";$("workForm").textContent=current.changed?"【基本形】"+current.answer+"　→　【ワーク】"+current.work_form:"【ワーク】"+current.work_form;$("point").textContent=current.reason;$("answer").disabled=true;$("nextBtn").classList.remove("hidden")}
function next(){index++;if(index<pool.length){show();return}if(!wrongNext.length){finish();return}round++;pool=wrongNext.slice();wrongNext=[];index=0;show();$("banner").textContent="前の周で間違えた "+pool.length+" 問だけを復習します。";$("banner").classList.remove("hidden")}
function finish(){$("game").classList.add("hidden");$("finish").classList.remove("hidden");$("score").textContent=Math.round(firstCorrect/firstTotal*100)+"%";$("summary").textContent="1周目は "+firstCorrect+" / "+firstTotal+" 正解。"+round+"周で全問正解しました。"}
function clampRangeInput(input){
  const n = Number(input.value);
  if (input.value === "") return;
  if (!Number.isFinite(n)) return;
  input.value = Math.min(138, Math.max(1, Math.trunc(n)));
}
$("startNo").addEventListener("change", e => clampRangeInput(e.target));
$("endNo").addEventListener("change", e => clampRangeInput(e.target));
$("startBtn").onclick=start;$("checkBtn").onclick=check;$("nextBtn").onclick=next;$("restartBtn").onclick=()=>{$("finish").classList.add("hidden");$("setup").classList.remove("hidden")};$("answer").onkeydown=e=>{if(e.key==="Enter")answered?next():check()};
</script></body></html>
