<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>英語W2 復習機能テスト</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f7;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}
main{max-width:560px;margin:auto;padding:16px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
h1{font-size:21px;margin:0 0 16px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:13px;color:#667085;margin-bottom:6px}
input{width:100%;padding:14px;border:2px solid #d7dde7;border-radius:14px;font-size:18px;background:#fff;outline:none}
button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:800;margin-top:12px}
.primary{background:#111827;color:white}
.secondary{background:#4f46e5;color:white}
.hidden{display:none}
.meta{display:flex;justify-content:space-between;color:#667085;font-size:14px;margin-bottom:10px}
.jp{min-height:110px;padding:22px;border-radius:16px;background:#f6f8fb;display:flex;align-items:center;font-size:24px;font-weight:800;line-height:1.5}
.result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.55}
.ok{background:#edf9f0;border:1px solid #bce4c6}
.ng{background:#fff1f1;border:1px solid #f0c0c0}
.note{font-size:14px;color:#344054;margin-top:8px}
.banner{background:#fff7db;border:1px solid #ecd98d;border-radius:12px;padding:11px;margin-bottom:12px;font-size:14px}
.small{font-size:12px;color:#667085;line-height:1.5;margin-top:12px}
</style>
</head>
<body>
<main>
  <h1>英語W2 復習機能テスト</h1>

  <section id="setup" class="card">
    <div class="row">
      <div>
        <label for="startNo">開始番号</label>
        <input id="startNo" type="number" min="1" max="10" value="1">
      </div>
      <div>
        <label for="endNo">終了番号</label>
        <input id="endNo" type="number" min="1" max="10" value="10">
      </div>
    </div>
    <button id="startBtn" class="primary">この範囲で開始</button>
    <div class="small">選んだ範囲を番号順で1周し、間違えた問題だけ2周目・3周目へ進みます。</div>
  </section>

  <section id="game" class="card hidden">
    <div id="banner" class="banner hidden"></div>
    <div class="meta">
      <span id="roundText"></span>
      <span id="progress"></span>
    </div>
    <div id="jp" class="jp"></div>

    <label for="answer" style="margin-top:18px">英語を入力</label>
    <input id="answer" type="text" autocomplete="off" autocorrect="off" spellcheck="false">

    <button id="checkBtn" class="primary">答え合わせ</button>

    <div id="result" class="result">
      <strong id="judge"></strong>
      <div id="correct" style="font-weight:800;margin-top:5px"></div>
      <div id="note" class="note"></div>
    </div>

    <button id="nextBtn" class="secondary hidden">次の問題</button>
  </section>

  <section id="finish" class="card hidden">
    <h2 style="margin-top:0">🎉 全問クリア！</h2>
    <p id="summary"></p>
    <button id="restartBtn" class="primary">範囲選択に戻る</button>
  </section>
</main>

<script>
const QUESTIONS = [{"id": 1, "jp": "青ざめる", "answer": "turn pale", "note": "turn + 形容詞で「～になる」。ワークでは過去だったので turned pale。"}, {"id": 2, "jp": "起きたままでいる", "answer": "stay awake", "note": "stay + 形容詞で「～のままでいる」。ワークでは過去だったので stayed awake。"}, {"id": 3, "jp": "おもしろそうだ", "answer": "sound interesting", "note": "sound + 形容詞で「～そうだ」。ワークでは主語が三人称単数なので sounds interesting。"}, {"id": 4, "jp": "眠いと感じる", "answer": "feel sleepy", "note": "feel + 形容詞で「～と感じる」。"}, {"id": 5, "jp": "人に物を送る", "answer": "send 人 物", "note": "send + 人 + 物で「人に物を送る」。ワークでは過去なので sent me。"}, {"id": 6, "jp": "人に英語を教える", "answer": "teach English to 人", "note": "teach 物 to 人で「人に物を教える」。ワークでは teaches English to。"}, {"id": 7, "jp": "人のためにドレスを作る", "answer": "make a dress for 人", "note": "make 物 for 人で「人のために物を作る」。ワークでは made a dress for。"}, {"id": 8, "jp": "人を怒らせる", "answer": "make 人 angry", "note": "make + 人 + 形容詞で「人を～な状態にする」。ワークでは made me angry。"}, {"id": 9, "jp": "横になる", "answer": "lie down", "note": "lie down で「横になる」。"}, {"id": 10, "jp": "～を置く・築く", "answer": "lay", "note": "lay は「～を置く・築く」。ワークでは過去なので laid。"}];

let pool = [];
let wrongNext = [];
let index = 0;
let round = 1;
let current = null;
let answered = false;
let firstTotal = 0;
let firstCorrect = 0;

const $ = id => document.getElementById(id);

function normalize(text) {
  return text
    .trim()
    .replace(/　/g, " ")
    .replace(/\s+/g, " ")
    .replace(/[.]$/,"");
}

function startGame() {
  let start = Math.max(1, Math.min(10, Number($("startNo").value) || 1));
  let end = Math.max(1, Math.min(10, Number($("endNo").value) || 10));
  if (start > end) [start, end] = [end, start];

  pool = QUESTIONS.filter(q => q.id >= start && q.id <= end);
  wrongNext = [];
  index = 0;
  round = 1;
  firstTotal = pool.length;
  firstCorrect = 0;

  $("setup").classList.add("hidden");
  $("finish").classList.add("hidden");
  $("game").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  current = pool[index];
  answered = false;

  $("roundText").textContent = round === 1 ? "1周目" : `${round}周目（復習）`;
  $("progress").textContent = `${index + 1} / ${pool.length}　問題${current.id}`;
  $("jp").textContent = current.jp;
  $("answer").value = "";
  $("answer").disabled = false;
  $("result").style.display = "none";
  $("nextBtn").classList.add("hidden");
  $("banner").classList.add("hidden");
  $("answer").focus();
}

function checkAnswer() {
  if (answered) return;
  const typed = $("answer").value;
  if (!typed.trim()) return;

  const ok = normalize(typed) === normalize(current.answer);
  answered = true;

  if (round === 1 && ok) firstCorrect++;
  if (!ok && !wrongNext.some(q => q.id === current.id)) wrongNext.push(current);

  $("result").className = "result " + (ok ? "ok" : "ng");
  $("result").style.display = "block";
  $("judge").textContent = ok ? "⭕ 正解！" : "❌ 不正解";
  $("correct").textContent = "正解：" + current.answer;
  $("note").textContent = current.note;
  $("answer").disabled = true;
  $("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  index++;

  if (index < pool.length) {
    showQuestion();
    return;
  }

  if (wrongNext.length === 0) {
    finishGame();
    return;
  }

  round++;
  pool = wrongNext.slice(); // 番号順を維持
  wrongNext = [];
  index = 0;
  showQuestion();
  $("banner").textContent = `前の周で間違えた ${pool.length} 問だけを復習します。`;
  $("banner").classList.remove("hidden");
}

function finishGame() {
  $("game").classList.add("hidden");
  $("finish").classList.remove("hidden");
  $("summary").textContent = `1周目は ${firstCorrect} / ${firstTotal} 正解。${round}周で全問正解しました。`;
}

$("startBtn").addEventListener("click", startGame);
$("checkBtn").addEventListener("click", checkAnswer);
$("nextBtn").addEventListener("click", nextQuestion);
$("restartBtn").addEventListener("click", () => {
  $("finish").classList.add("hidden");
  $("setup").classList.remove("hidden");
});
$("answer").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    answered ? nextQuestion() : checkAnswer();
  }
});
</script>
</body>
</html>
