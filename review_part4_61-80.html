<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>英語W2 61〜80</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}main{max-width:590px;margin:auto;padding:16px 12px 34px}.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 28px #00000014}h1{font-size:22px}.title{font-size:27px;font-weight:900}.sub{color:#667085;margin-bottom:14px}.notice{background:#f6f8fb;border:1px solid #dde3ec;border-radius:14px;padding:14px;margin-bottom:14px}.notice h3{margin:0 0 9px;font-size:15px}.ni{display:grid;grid-template-columns:14px 1fr;gap:9px;margin:9px 0;font-size:13px;color:#475467;line-height:1.55}.ex{margin-top:7px}.er{display:grid;grid-template-columns:22px 1fr;gap:7px;margin:4px 0}label{display:block;font-size:13px;color:#667085;margin:18px 0 7px}input{width:100%;padding:15px;border:2px solid #d7dde7;border-radius:14px;font-size:18px}button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:850;margin-top:12px}.primary{background:#111827;color:#fff}.next{background:#4f46e5;color:#fff}.hidden{display:none!important}.meta{display:flex;justify-content:space-between;color:#667085;font-size:14px;margin-bottom:10px}.jp{min-height:116px;padding:22px;border-radius:16px;background:#f6f8fb;display:flex;align-items:center;font-size:24px;font-weight:850;line-height:1.5}.result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.55}.ok{background:#edf9f0;border:1px solid #bce4c6}.ng{background:#fff1f1;border:1px solid #f0c0c0}.ans{font-size:18px;font-weight:900;margin-top:6px}.sec{background:#ffffffd1;border-radius:12px;padding:11px;margin-top:10px}.st{font-size:12px;color:#667085;font-weight:850;margin-bottom:5px}.we{font-weight:850;line-height:1.55}.txt{font-size:14px;color:#344054;margin-top:5px;line-height:1.68}.wf{font-size:14px;font-weight:850}.banner{background:#fff7db;border:1px solid #ecd98d;border-radius:12px;padding:11px;margin-bottom:12px;font-size:14px}.score{font-size:34px;font-weight:950}
</style></head><body><main><h1>英語W2 暗記テスト</h1>
<section id="setup" class="card"><div class="title">61〜80問</div><div class="sub">間違えた問題は、全問正解するまで自動で復習します。</div>
<div class="notice"><h3>入力時の注意</h3>
<div class="ni"><b>・</b><div>スペースの有無まで採点します。<div class="ex"><div class="er"><span>○</span><span>make 人 動詞の原形</span></div><div class="er"><span>×</span><span>make人 動詞の原形</span></div></div></div></div>
<div class="ni"><b>・</b><div>漢字や英単語も表示どおり入力してください。<div class="ex">例：原形を原型と入力すると不正解です。</div></div></div>
<div class="ni"><b>・</b><div>全角スペースと半角スペースは、どちらでも正解になります。</div></div><div class="ni"><b>・</b><div>ピリオド（.）は入力しなくて大丈夫です。</div></div><div class="ni"><b>・</b><div>疑問文は最後の「?」まで入力してください。</div></div><div class="ni"><b>・</b><div>命令文は文頭を大文字で入力してください。</div></div></div>
<button id="startBtn" class="primary">テスト開始</button></section>
<section id="game" class="card hidden"><div id="banner" class="banner hidden"></div><div class="meta"><span id="roundText"></span><span id="progress"></span></div><div id="jp" class="jp"></div><label>英語を入力</label><input id="answer" autocomplete="off" autocorrect="off" spellcheck="false"><button id="checkBtn" class="primary">答え合わせ</button><button id="nextBtn" class="next hidden">次の問題</button>
<div id="result" class="result"><strong id="judge"></strong><div id="correct" class="ans"></div><div class="sec"><div class="st">基本形</div><div id="basic" class="txt"></div></div><div class="sec"><div class="st">📖 ワークではこう使われている</div><div id="workEn" class="we"></div><div id="workJa" class="txt"></div></div><div class="sec"><div class="st">💡 ポイント</div><div id="workForm" class="wf"></div><div id="point" class="txt"></div></div></div></section>
<section id="finish" class="card hidden"><h2>🎉 全問正解！</h2><div id="score" class="score"></div><p id="summary"></p><button id="restartBtn" class="primary">もう一度やる</button></section></main>
<script>const QUESTIONS=[{"id": 61, "jp": "～だった（単数主語）", "answer": "was", "basic": "was は be動詞の過去形で、単数主語に使います。", "work_en": "The weather was very cold yesterday.", "work_ja": "昨日はとても寒かった。", "work_form": "was", "changed": false, "reason": "was がそのまま使われています。主語 The weather は単数で、yesterday があるため過去形です。"}, {"id": 62, "jp": "未来の時点までに5回行ったことになる", "answer": "will have been", "basic": "will have + 過去分詞で未来完了を表します。", "work_en": "By next month, I will have been to Kyoto five times.", "work_ja": "来月までには、私は京都へ5回行ったことになる。", "work_form": "will have been", "changed": false, "reason": "will have been がそのまま使われています。by next month が未来の期限を表し、been to で「～へ行ったことがある」です。"}, {"id": 63, "jp": "ずっと探している", "answer": "have been looking", "basic": "have/has been + 動詞ing は現在完了進行形です。", "work_en": "I have been looking for my key since this morning.", "work_ja": "私は今朝からずっと鍵を探している。", "work_form": "have been looking", "changed": false, "reason": "have been looking がそのまま使われています。主語が I なので have、look for で「～を探す」です。"}, {"id": 64, "jp": "ずっと待っていた", "answer": "had been waiting", "basic": "had been + 動詞ing は過去完了進行形です。", "work_en": "She had been waiting for him for two hours when he arrived.", "work_ja": "彼が到着したとき、彼女は2時間ずっと彼を待っていた。", "work_form": "had been waiting", "changed": false, "reason": "had been waiting がそのまま使われています。彼が到着した時点まで待つ動作が続いていたためです。"}, {"id": 65, "jp": "～かもしれない", "answer": "might", "basic": "might + 動詞の原形で「～かもしれない」。", "work_en": "It might rain this afternoon.", "work_ja": "今日の午後は雨が降るかもしれない。", "work_form": "might rain", "changed": true, "reason": "基本形 might の後ろに動詞の原形 rain が続いています。"}, {"id": 66, "jp": "～していただけますか？", "answer": "Would you ...?", "basic": "Would you + 動詞の原形 ...? は丁寧な依頼です。", "work_en": "Would you open the window?", "work_ja": "窓を開けていただけますか。", "work_form": "Would you open the window?", "changed": true, "reason": "基本形の ... に open the window が入っています。疑問文なので文頭は Would、最後は ? が必要です。"}, {"id": 67, "jp": "～だったかもしれない", "answer": "might have been", "basic": "might have + 過去分詞で過去の推量を表します。", "work_en": "He might have been sick yesterday.", "work_ja": "彼は昨日、病気だったのかもしれない。", "work_form": "might have been", "changed": false, "reason": "might have been がそのまま使われています。昨日のことを推量しているためです。"}, {"id": 68, "jp": "見たはずがない", "answer": "cannot have seen", "basic": "cannot have + 過去分詞で「～したはずがない」。", "work_en": "She cannot have seen the accident.", "work_ja": "彼女がその事故を見たはずがない。", "work_form": "cannot have seen", "changed": false, "reason": "cannot have seen がそのまま使われています。see の過去分詞は seen です。"}, {"id": 69, "jp": "受け取っているはずだ", "answer": "should have received", "basic": "should have + 過去分詞で「～したはずだ」。", "work_en": "He should have received my letter by now.", "work_ja": "彼はもう私の手紙を受け取っているはずだ。", "work_form": "should have received", "changed": false, "reason": "should have received がそのまま使われています。receive の過去分詞は received です。"}, {"id": 70, "jp": "放送される", "answer": "be shown", "basic": "be + 過去分詞は受動態です。show の過去分詞は shown。", "work_en": "The program is shown every Sunday.", "work_ja": "その番組は毎週日曜日に放送される。", "work_form": "is shown", "changed": true, "reason": "基本形は be shown。主語 The program が単数で現在の習慣を表すため、be動詞が is になっています。"}, {"id": 71, "jp": "発明された", "answer": "was invented", "basic": "was/were + 過去分詞は過去の受動態です。", "work_en": "The telephone was invented by Alexander Graham Bell.", "work_ja": "電話はアレクサンダー・グラハム・ベルによって発明された。", "work_form": "was invented", "changed": false, "reason": "was invented がそのまま使われています。主語 The telephone が単数なので was です。"}, {"id": 72, "jp": "設計された", "answer": "was designed", "basic": "was/were + 過去分詞は過去の受動態です。", "work_en": "This building was designed by a famous architect.", "work_ja": "この建物は有名な建築家によって設計された。", "work_form": "was designed", "changed": false, "reason": "was designed がそのまま使われています。主語 This building が単数なので was です。"}, {"id": 73, "jp": "使われている", "answer": "be used", "basic": "be used で「使われている」。", "work_en": "These machines are used in many factories.", "work_ja": "これらの機械は多くの工場で使われている。", "work_form": "are used", "changed": true, "reason": "基本形は be used。主語 These machines が複数なので、be動詞が are になっています。"}, {"id": 74, "jp": "すでに洗われている", "answer": "have already been washed", "basic": "have/has been + 過去分詞は現在完了の受動態です。", "work_en": "The dishes have already been washed.", "work_ja": "皿はすでに洗われている。", "work_form": "have already been washed", "changed": false, "reason": "have already been washed がそのまま使われています。主語 The dishes が複数なので have を使います。"}, {"id": 75, "jp": "演奏されていた", "answer": "was being played", "basic": "was/were being + 過去分詞は過去進行形の受動態です。", "work_en": "The piano was being played when I entered the room.", "work_ja": "私が部屋に入ったとき、ピアノが演奏されていた。", "work_form": "was being played", "changed": false, "reason": "was being played がそのまま使われています。過去のある時点で演奏の途中だったためです。"}, {"id": 76, "jp": "されなければならない", "answer": "must be done", "basic": "助動詞 + be + 過去分詞は助動詞を使った受動態です。", "work_en": "This work must be done by tomorrow.", "work_ja": "この仕事は明日までに終えられなければならない。", "work_form": "must be done", "changed": false, "reason": "must be done がそのまま使われています。must の後ろは原形 be、その後ろに done が続きます。"}, {"id": 77, "jp": "修理されますか？", "answer": "Will it be fixed?", "basic": "will be + 過去分詞で未来の受動態を表します。", "work_en": "Will it be fixed by tomorrow?", "work_ja": "それは明日までに修理されますか。", "work_form": "Will it be fixed by tomorrow?", "changed": true, "reason": "基本形 will be fixed を疑問文にするため Will を文頭に置いています。最後は ? が必要です。"}, {"id": 78, "jp": "この小説は誰によって書かれましたか？", "answer": "Who was this novel written by?", "basic": "Who + be動詞 + 主語 + 過去分詞 + by? の形です。", "work_en": "Who was this novel written by?", "work_ja": "この小説は誰によって書かれましたか。", "work_form": "Who was this novel written by?", "changed": false, "reason": "ワークの英文を一文そのまま答える問題です。write の過去分詞は written。最後は ? が必要です。"}, {"id": 79, "jp": "驚いた", "answer": "surprised", "basic": "surprised は人の感情「驚いた」を表します。", "work_en": "I was surprised at the news.", "work_ja": "私はその知らせに驚いた。", "work_form": "was surprised", "changed": true, "reason": "基本形は surprised。ワークでは「驚いた状態だった」ので be動詞 was と一緒に使われています。"}, {"id": 80, "jp": "戦争で亡くなった", "answer": "were killed in the war", "basic": "be killed in ～ で「～で命を落とす」。", "work_en": "Many people were killed in the war.", "work_ja": "多くの人々がその戦争で亡くなった。", "work_form": "were killed in the war", "changed": false, "reason": "were killed in the war がそのまま使われています。主語 Many people が複数で、過去の受動態なので were を使います。"}];let pool=[],wrongNext=[],index=0,round=1,current,answered=false,firstTotal=0,firstCorrect=0;const $=id=>document.getElementById(id);
function norm(t){return t.trim().replace(/　/g," ").replace(/\s+/g," ").replace(/[.]$/,"")}
function start(){pool=QUESTIONS.slice();wrongNext=[];index=0;round=1;firstTotal=pool.length;firstCorrect=0;$("setup").classList.add("hidden");$("finish").classList.add("hidden");$("game").classList.remove("hidden");show()}
function show(){current=pool[index];answered=false;$("roundText").textContent=round===1?"1周目":round+"周目（復習）";$("progress").textContent=(index+1)+" / "+pool.length+"　問題"+current.id;$("jp").textContent=current.jp;$("answer").value="";$("answer").disabled=false;$("result").style.display="none";$("nextBtn").classList.add("hidden");$("banner").classList.add("hidden");setTimeout(()=>$("answer").focus(),100)}
function correct(t,a){let nt=t.trim().replace(/　/g," ").replace(/\s+/g," "),na=a.trim().replace(/　/g," ").replace(/\s+/g," ");return a.endsWith("?")?nt===na:norm(nt)===norm(na)}
function check(){if(answered||!$("answer").value.trim())return;let ok=correct($("answer").value,current.answer);answered=true;if(round===1&&ok)firstCorrect++;if(!ok&&!wrongNext.some(q=>q.id===current.id))wrongNext.push(current);$("result").className="result "+(ok?"ok":"ng");$("result").style.display="block";$("judge").textContent=ok?"⭕ 正解！":"❌ 不正解";$("correct").textContent="正解："+current.answer;$("basic").textContent=current.basic;$("workEn").textContent=current.work_en;$("workJa").textContent="（"+current.work_ja+"）";$("workForm").textContent=current.changed?"【基本形】"+current.answer+"　→　【ワーク】"+current.work_form:"【ワーク】"+current.work_form;$("point").textContent=current.reason;$("answer").disabled=true;$("nextBtn").classList.remove("hidden")}
function next(){index++;if(index<pool.length){show();return}if(!wrongNext.length){finish();return}round++;pool=wrongNext.slice();wrongNext=[];index=0;show();$("banner").textContent="前の周で間違えた "+pool.length+" 問だけを復習します。";$("banner").classList.remove("hidden")}
function finish(){$("game").classList.add("hidden");$("finish").classList.remove("hidden");$("score").textContent=Math.round(firstCorrect/firstTotal*100)+"%";$("summary").textContent="1周目は "+firstCorrect+" / "+firstTotal+" 正解。"+round+"周で全問正解しました。"}
$("startBtn").onclick=start;$("checkBtn").onclick=check;$("nextBtn").onclick=next;$("restartBtn").onclick=()=>{$("finish").classList.add("hidden");$("setup").classList.remove("hidden")};$("answer").onkeydown=e=>{if(e.key==="Enter")answered?next():check()};
</script></body></html>
