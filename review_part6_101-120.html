<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>英語W2 101〜120</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}main{max-width:590px;margin:auto;padding:16px 12px 34px}.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 28px #00000014}h1{font-size:22px}.title{font-size:27px;font-weight:900}.sub{color:#667085;margin-bottom:14px}.notice{background:#f6f8fb;border:1px solid #dde3ec;border-radius:14px;padding:14px;margin-bottom:14px}.notice h3{margin:0 0 9px;font-size:15px}.ni{display:grid;grid-template-columns:14px 1fr;gap:9px;margin:9px 0;font-size:13px;color:#475467;line-height:1.55}.ex{margin-top:7px}.er{display:grid;grid-template-columns:22px 1fr;gap:7px;margin:4px 0}label{display:block;font-size:13px;color:#667085;margin:18px 0 7px}input{width:100%;padding:15px;border:2px solid #d7dde7;border-radius:14px;font-size:18px}button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:850;margin-top:12px}.primary{background:#111827;color:#fff}.next{background:#4f46e5;color:#fff}.hidden{display:none!important}.meta{display:flex;justify-content:space-between;color:#667085;font-size:14px;margin-bottom:10px}.jp{min-height:116px;padding:22px;border-radius:16px;background:#f6f8fb;display:flex;align-items:center;font-size:24px;font-weight:850;line-height:1.5}.result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.55}.ok{background:#edf9f0;border:1px solid #bce4c6}.ng{background:#fff1f1;border:1px solid #f0c0c0}.ans{font-size:18px;font-weight:900;margin-top:6px}.sec{background:#ffffffd1;border-radius:12px;padding:11px;margin-top:10px}.st{font-size:12px;color:#667085;font-weight:850;margin-bottom:5px}.we{font-weight:850;line-height:1.55}.txt{font-size:14px;color:#344054;margin-top:5px;line-height:1.68}.wf{font-size:14px;font-weight:850}.banner{background:#fff7db;border:1px solid #ecd98d;border-radius:12px;padding:11px;margin-bottom:12px;font-size:14px}.score{font-size:34px;font-weight:950}
</style></head><body><main><h1>英語W2 暗記テスト</h1>
<section id="setup" class="card"><div class="title">101〜120問</div><div class="sub">間違えた問題は、全問正解するまで自動で復習します。</div>
<div class="notice"><h3>入力時の注意</h3>
<div class="ni"><b>・</b><div>スペースの有無まで採点します。<div class="ex"><div class="er"><span>○</span><span>make 人 動詞の原形</span></div><div class="er"><span>×</span><span>make人 動詞の原形</span></div></div></div></div>
<div class="ni"><b>・</b><div>漢字や英単語も表示どおり入力してください。<div class="ex">例：原形を原型と入力すると不正解です。</div></div></div>
<div class="ni"><b>・</b><div>全角スペースと半角スペースは、どちらでも正解になります。</div></div><div class="ni"><b>・</b><div>ピリオド（.）は入力しなくて大丈夫です。</div></div><div class="ni"><b>・</b><div>疑問文は最後の「?」まで入力してください。</div></div><div class="ni"><b>・</b><div>命令文は文頭を大文字で入力してください。</div></div></div>
<button id="startBtn" class="primary">テスト開始</button></section>
<section id="game" class="card hidden"><div id="banner" class="banner hidden"></div><div class="meta"><span id="roundText"></span><span id="progress"></span></div><div id="jp" class="jp"></div><label>英語を入力</label><input id="answer" autocomplete="off" autocorrect="off" spellcheck="false"><button id="checkBtn" class="primary">答え合わせ</button><button id="nextBtn" class="next hidden">次の問題</button>
<div id="result" class="result"><strong id="judge"></strong><div id="correct" class="ans"></div><div class="sec"><div class="st">基本形</div><div id="basic" class="txt"></div></div><div class="sec"><div class="st">📖 ワークではこう使われている</div><div id="workEn" class="we"></div><div id="workJa" class="txt"></div></div><div class="sec"><div class="st">💡 ポイント</div><div id="workForm" class="wf"></div><div id="point" class="txt"></div></div></div></section>
<section id="finish" class="card hidden"><h2>🎉 全問正解！</h2><div id="score" class="score"></div><p id="summary"></p><button id="restartBtn" class="primary">もう一度やる</button></section></main>
<script>const QUESTIONS=[{"id": 101, "jp": "偶然～した", "answer": "happen to 動詞", "basic": "happen to + 動詞の原形＝「偶然～する」。", "work_en": "They happened to discover they had a friend in common.", "work_ja": "彼らは自分たちに共通の友人がいることを偶然知った。", "work_form": "happened to discover", "changed": true, "reason": "基本形は happen to 動詞。ワークでは過去の話なので happen → happened。動詞の部分には discover が入っています。"}, {"id": 102, "jp": "～を知っているようだった", "answer": "seem to know", "basic": "seem to + 動詞の原形＝「～するようだ」。", "work_en": "She seemed to know everything about the story.", "work_ja": "彼女はその物語について何でも知っているようだった。", "work_form": "seemed to know", "changed": true, "reason": "基本形は seem to know。過去の話なので seem → seemed になっています。"}, {"id": 103, "jp": "～だと分かった", "answer": "turn out to be", "basic": "turn out to be＝「～だと分かる・判明する」。", "work_en": "The medicine turned out to be effective against the flu.", "work_ja": "その薬はインフルエンザに効き目があることが分かった。", "work_form": "turned out to be", "changed": true, "reason": "基本形は turn out to be。過去の話なので turn → turned になっています。"}, {"id": 104, "jp": "描いたようだ", "answer": "to have drawn", "basic": "to have + 過去分詞で、主節より前に起きたことを表します。", "work_en": "Roy seems to have drawn this picture.", "work_ja": "ロイがこの絵を描いたようだ。", "work_form": "to have drawn", "changed": false, "reason": "to have drawn がそのまま使われています。絵を描いたのは「そう思われる現在」より前なので、完了不定詞を使います。draw の過去分詞は drawn です。"}, {"id": 105, "jp": "何をすべきか", "answer": "what to do", "basic": "疑問詞 + to 動詞＝「何を・どこで・どうやって～すべきか」。", "work_en": "She was so upset that she did not know what to do.", "work_ja": "彼女はとても動揺して、何をすべきか分からなかった。", "work_form": "what to do", "changed": false, "reason": "what to do がそのまま使われています。what の後ろに to do を置いて「何をすべきか」を表します。"}, {"id": 106, "jp": "どこへ行くべきか", "answer": "where to go", "basic": "where to + 動詞の原形＝「どこへ～すべきか」。", "work_en": "Aki hasn't decided where to go for her summer vacation.", "work_ja": "アキは夏休みにどこへ行くか決めていない。", "work_form": "where to go", "changed": false, "reason": "where to go がそのまま使われています。where の後ろに to go を置いて「どこへ行くべきか」を表します。"}, {"id": 107, "jp": "必ず明かりを消しなさい", "answer": "Be sure to put out the light", "basic": "be sure to + 動詞の原形＝「必ず～しなさい」。put out the light＝「明かりを消す」。", "work_en": "Be sure to put out the light before you go to bed.", "work_ja": "寝る前に必ず明かりを消しなさい。", "work_form": "Be sure to put out the light", "changed": false, "reason": "ワークの表現がそのまま使われています。命令文なので Be は大文字で始めます。"}, {"id": 108, "jp": "克服するのが難しい", "answer": "difficult to overcome", "basic": "形容詞 + to 動詞で「～するのが…だ」。overcome＝「克服する」。", "work_en": "Your problem is not difficult to overcome.", "work_ja": "あなたの問題は克服するのが難しくない。", "work_form": "difficult to overcome", "changed": false, "reason": "difficult to overcome がそのまま使われています。to overcome が「何をするのが難しいか」を説明しています。"}, {"id": 109, "jp": "～するのを楽しみにしている", "answer": "look forward to 動名詞", "basic": "look forward to + 名詞・動名詞＝「～を楽しみにする」。この to は前置詞です。", "work_en": "Many foreign visitors are looking forward to visiting landscape gardens in Kyoto.", "work_ja": "多くの外国人観光客が京都の日本庭園を訪れるのを楽しみにしている。", "work_form": "are looking forward to visiting", "changed": true, "reason": "基本形は look forward to 動名詞。主語が複数で現在進行形なので are looking forward。to の後ろは動詞の原形 visit ではなく visiting です。"}, {"id": 110, "jp": "～するのに十分…だ", "answer": "enough to", "basic": "形容詞・副詞 + enough to 動詞＝「～するのに十分…だ」。", "work_en": "Luckily, the dolphin got strong enough to be released into the ocean again.", "work_ja": "幸運にも、そのイルカは再び海へ放されるのに十分なほど元気になった。", "work_form": "strong enough to be released", "changed": true, "reason": "基本形は enough to。ワークでは enough の前に strong が入り、イルカは放される側なので to be released という受動態になっています。"}, {"id": 111, "jp": "疲れすぎて一生懸命勉強できない", "answer": "too tired to study hard", "basic": "too + 形容詞 + to 動詞＝「～すぎて…できない」。", "work_en": "I was too tired to study hard for the rest of the day.", "work_ja": "私は疲れすぎて、その日の残りは一生懸命勉強できなかった。", "work_form": "too tired to study hard", "changed": false, "reason": "too tired to study hard がそのまま使われています。too ... to ～ で「…すぎて～できない」を表します。"}, {"id": 112, "jp": "言うまでもなく", "answer": "Needless to say", "basic": "Needless to say＝「言うまでもなく」。文全体を修飾する決まり表現です。", "work_en": "Needless to say, practice is important.", "work_ja": "言うまでもなく、練習は大切だ。", "work_form": "Needless to say", "changed": false, "reason": "Needless to say がそのまま使われています。文頭なので Needless は大文字です。"}, {"id": 113, "jp": "正直に言うと", "answer": "To be honest", "basic": "To be honest＝「正直に言うと」。文全体を修飾する決まり表現です。", "work_en": "To be honest, I don't like the movie very much.", "work_ja": "正直に言うと、私はその映画があまり好きではない。", "work_form": "To be honest", "changed": false, "reason": "To be honest がそのまま使われています。文頭なので To は大文字です。"}, {"id": 114, "jp": "実を言うと", "answer": "To tell the truth", "basic": "To tell the truth＝「実を言うと」。文全体を修飾する決まり表現です。", "work_en": "To tell the truth, it does not always pay to tell the truth.", "work_ja": "実を言うと、真実を言うことがいつも割に合うとは限らない。", "work_form": "To tell the truth", "changed": false, "reason": "To tell the truth がそのまま使われています。文頭なので To は大文字です。"}, {"id": 115, "jp": "鳥を見ること", "answer": "watching birds", "basic": "動名詞は「～すること」を表し、文の主語にもなれます。", "work_en": "Watching birds gives me great pleasure.", "work_ja": "鳥を見ることは私に大きな楽しみを与えてくれる。", "work_form": "Watching birds", "changed": true, "reason": "基本形は watching birds。ワークでは文頭に置かれているため Watching と大文字になっています。動名詞句全体は単数扱いなので gives です。"}, {"id": 116, "jp": "熱いお風呂に入ること", "answer": "taking a hot bath", "basic": "動名詞 taking は「入ること」を表します。take a bath＝「風呂に入る」。", "work_en": "I like taking a hot bath.", "work_ja": "私は熱いお風呂に入るのが好きだ。", "work_form": "taking a hot bath", "changed": false, "reason": "taking a hot bath がそのまま使われています。like の後ろに動名詞を置いて「～するのが好きだ」を表します。"}, {"id": 117, "jp": "アクセサリーを作ること", "answer": "making accessories", "basic": "動名詞 making は「作ること」を表します。", "work_en": "My hobby is making accessories.", "work_ja": "私の趣味はアクセサリーを作ることだ。", "work_form": "making accessories", "changed": false, "reason": "making accessories がそのまま使われています。be動詞の後ろで、趣味の内容を説明しています。"}, {"id": 118, "jp": "たばこを吸うのをやめる", "answer": "stop smoking", "basic": "stop + 動名詞＝「～するのをやめる」。", "work_en": "People are giving up smoking these days.", "work_ja": "近ごろ、人々はたばこを吸うのをやめている。", "work_form": "giving up smoking", "changed": true, "reason": "出題は stop smoking という基本表現です。ワークでは同じ意味の give up smoking が使われ、現在進行形なので are giving up smoking になっています。"}, {"id": 119, "jp": "弁護士になることを決める", "answer": "decide to become", "basic": "decide to + 動詞の原形＝「～することを決める」。", "work_en": "I've decided to become a lawyer.", "work_ja": "私は弁護士になることを決めた。", "work_form": "decided to become", "changed": true, "reason": "基本形は decide to become。現在完了で決定済みの状態を表すため、I've decided to become になっています。"}, {"id": 120, "jp": "話すのをやめる", "answer": "quit talking", "basic": "quit + 動名詞＝「～するのをやめる」。", "work_en": "I asked them to quit talking in the library.", "work_ja": "私は彼らに図書館で話すのをやめるよう頼んだ。", "work_form": "quit talking", "changed": false, "reason": "quit talking がそのまま使われています。quit の後ろは to talk ではなく talking です。"}];let pool=[],wrongNext=[],index=0,round=1,current,answered=false,firstTotal=0,firstCorrect=0;const $=id=>document.getElementById(id);
function norm(t){return t.trim().replace(/　/g," ").replace(/\s+/g," ").replace(/[.]$/,"")}
function start(){pool=QUESTIONS.slice();wrongNext=[];index=0;round=1;firstTotal=pool.length;firstCorrect=0;$("setup").classList.add("hidden");$("finish").classList.add("hidden");$("game").classList.remove("hidden");show()}
function show(){current=pool[index];answered=false;$("roundText").textContent=round===1?"1周目":round+"周目（復習）";$("progress").textContent=(index+1)+" / "+pool.length+"　問題"+current.id;$("jp").textContent=current.jp;$("answer").value="";$("answer").disabled=false;$("result").style.display="none";$("nextBtn").classList.add("hidden");$("banner").classList.add("hidden");setTimeout(()=>$("answer").focus(),100)}
function correct(t,a){let nt=t.trim().replace(/　/g," ").replace(/\s+/g," "),na=a.trim().replace(/　/g," ").replace(/\s+/g," ");return a.endsWith("?")?nt===na:norm(nt)===norm(na)}
function check(){if(answered||!$("answer").value.trim())return;let ok=correct($("answer").value,current.answer);answered=true;if(round===1&&ok)firstCorrect++;if(!ok&&!wrongNext.some(q=>q.id===current.id))wrongNext.push(current);$("result").className="result "+(ok?"ok":"ng");$("result").style.display="block";$("judge").textContent=ok?"⭕ 正解！":"❌ 不正解";$("correct").textContent="正解："+current.answer;$("basic").textContent=current.basic;$("workEn").textContent=current.work_en;$("workJa").textContent="（"+current.work_ja+"）";$("workForm").textContent=current.changed?"【基本形】"+current.answer+"　→　【ワーク】"+current.work_form:"【ワーク】"+current.work_form;$("point").textContent=current.reason;$("answer").disabled=true;$("nextBtn").classList.remove("hidden")}
function next(){index++;if(index<pool.length){show();return}if(!wrongNext.length){finish();return}round++;pool=wrongNext.slice();wrongNext=[];index=0;show();$("banner").textContent="前の周で間違えた "+pool.length+" 問だけを復習します。";$("banner").classList.remove("hidden")}
function finish(){$("game").classList.add("hidden");$("finish").classList.remove("hidden");$("score").textContent=Math.round(firstCorrect/firstTotal*100)+"%";$("summary").textContent="1周目は "+firstCorrect+" / "+firstTotal+" 正解。"+round+"周で全問正解しました。"}
$("startBtn").onclick=start;$("checkBtn").onclick=check;$("nextBtn").onclick=next;$("restartBtn").onclick=()=>{$("finish").classList.add("hidden");$("setup").classList.remove("hidden")};$("answer").onkeydown=e=>{if(e.key==="Enter")answered?next():check()};
</script></body></html>
